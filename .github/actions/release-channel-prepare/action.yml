name: Prepare exact downstream channel request
description: Verify one channel payload and bind it to the exact release receipt and plan.

inputs:
  channel: {required: true}
  receipt-run-id: {required: true}
  plan-artifact-id: {required: true}
  plan-artifact-digest: {required: true}
  payload-artifact-id: {required: true}
  payload-artifact-digest: {required: true}
  pre-site-summary-artifact-id: {required: false, default: ""}
  pre-site-summary-artifact-digest: {required: false, default: ""}
  source-sha: {required: true}
  release-id: {required: true}
  release-ref: {required: true}

outputs:
  root:
    value: ${{ steps.paths.outputs.root }}
  request:
    value: ${{ steps.paths.outputs.request }}
  payload-document:
    value: ${{ steps.paths.outputs.payload_document }}
  payload-root:
    value: ${{ steps.paths.outputs.payload_root }}

runs:
  using: composite
  steps:
    - id: paths
      name: Validate channel inputs and allocate evidence paths
      shell: bash
      env:
        RMUX_CHANNEL: ${{ inputs.channel }}
        RMUX_RECEIPT_RUN_ID: ${{ inputs.receipt-run-id }}
        RMUX_PLAN_ARTIFACT_ID: ${{ inputs.plan-artifact-id }}
        RMUX_PLAN_ARTIFACT_DIGEST: ${{ inputs.plan-artifact-digest }}
        RMUX_PAYLOAD_ARTIFACT_ID: ${{ inputs.payload-artifact-id }}
        RMUX_PAYLOAD_ARTIFACT_DIGEST: ${{ inputs.payload-artifact-digest }}
        RMUX_PRE_SITE_ARTIFACT_ID: ${{ inputs.pre-site-summary-artifact-id }}
        RMUX_PRE_SITE_ARTIFACT_DIGEST: ${{ inputs.pre-site-summary-artifact-digest }}
        RMUX_SOURCE_SHA: ${{ inputs.source-sha }}
        RMUX_RELEASE_ID: ${{ inputs.release-id }}
        RMUX_RELEASE_REF: ${{ inputs.release-ref }}
      run: |
        set -euo pipefail
        test "$GITHUB_REPOSITORY" = "Helvesec/rmux"
        test "$GITHUB_REPOSITORY_ID" = "1239918790"
        test "$GITHUB_RUN_ATTEMPT" = 1
        [[ "$RMUX_CHANNEL" =~ ^(apt_rpm|chocolatey|crates_io|homebrew_core|homebrew_tap|rmux_io|scoop|snap_candidate|snap_stable|web_share|winget)$ ]]
        for value in "$RMUX_RECEIPT_RUN_ID" "$RMUX_PLAN_ARTIFACT_ID" "$RMUX_PAYLOAD_ARTIFACT_ID" "$RMUX_RELEASE_ID"; do
          [[ "$value" =~ ^[1-9][0-9]*$ ]]
        done
        [[ "$RMUX_PLAN_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
        [[ "$RMUX_PAYLOAD_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
        [[ "$RMUX_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
        [[ "$RMUX_RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]
        if [ "$RMUX_CHANNEL" = rmux_io ]; then
          [[ "$RMUX_PRE_SITE_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RMUX_PRE_SITE_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
        else
          test -z "$RMUX_PRE_SITE_ARTIFACT_ID" && test -z "$RMUX_PRE_SITE_ARTIFACT_DIGEST"
        fi
        root="$RUNNER_TEMP/rmux-channel-$RMUX_CHANNEL"
        test ! -e "$root"
        mkdir -p "$root/plan" "$root/payload" "$root/pre-site"
        {
          echo "root=$root"
          echo "request=$root/downstream-channel-request.json"
          echo "payload_document=$root/channel-payload.json"
          echo "payload_root=$root/payload"
        } >> "$GITHUB_OUTPUT"

    - name: Verify plan and payload artifact identities
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        RMUX_CHANNEL: ${{ inputs.channel }}
        RMUX_RECEIPT_RUN_ID: ${{ inputs.receipt-run-id }}
        RMUX_PLAN_ARTIFACT_ID: ${{ inputs.plan-artifact-id }}
        RMUX_PLAN_ARTIFACT_DIGEST: ${{ inputs.plan-artifact-digest }}
        RMUX_PAYLOAD_ARTIFACT_ID: ${{ inputs.payload-artifact-id }}
        RMUX_PAYLOAD_ARTIFACT_DIGEST: ${{ inputs.payload-artifact-digest }}
        RMUX_SOURCE_SHA: ${{ inputs.source-sha }}
        RMUX_RELEASE_ID: ${{ inputs.release-id }}
        RMUX_RELEASE_REF: ${{ inputs.release-ref }}
      run: |
        set -euo pipefail
        scripts/release/assert-release-capability.py downstream_channels
        scripts/release/actions-artifact.py verify \
          --repository "$GITHUB_REPOSITORY" --run-id "$RMUX_RECEIPT_RUN_ID" \
          --artifact-id "$RMUX_PLAN_ARTIFACT_ID" \
          --name "rmux-downstream-plan-$RMUX_SOURCE_SHA-$RMUX_RELEASE_ID" \
          --expected-source-sha "$RMUX_SOURCE_SHA" \
          --expected-digest "$RMUX_PLAN_ARTIFACT_DIGEST" \
          --expected-workflow-id 316435347 \
          --expected-workflow-path .github/workflows/release-receipt.yml \
          --expected-event workflow_dispatch --expected-head-branch "$RMUX_RELEASE_REF" \
          --allow-running-current-run \
          --max-attempts 1
        scripts/release/actions-artifact.py verify \
          --repository "$GITHUB_REPOSITORY" --run-id "$RMUX_RECEIPT_RUN_ID" \
          --artifact-id "$RMUX_PAYLOAD_ARTIFACT_ID" \
          --name "rmux-downstream-$RMUX_CHANNEL-payload-$RMUX_SOURCE_SHA-$RMUX_RELEASE_ID" \
          --expected-source-sha "$RMUX_SOURCE_SHA" \
          --expected-digest "$RMUX_PAYLOAD_ARTIFACT_DIGEST" \
          --expected-workflow-id 316435347 \
          --expected-workflow-path .github/workflows/release-receipt.yml \
          --expected-event workflow_dispatch --expected-head-branch "$RMUX_RELEASE_REF" \
          --allow-running-current-run \
          --max-attempts 1

    - name: Verify the exact pre-site summary identity
      if: inputs.channel == 'rmux_io'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: >-
        scripts/release/actions-artifact.py verify
        --repository "$GITHUB_REPOSITORY" --run-id "${{ inputs.receipt-run-id }}"
        --artifact-id "${{ inputs.pre-site-summary-artifact-id }}"
        --name "rmux-downstream-pre-site-summary-${{ inputs.source-sha }}-${{ inputs.release-id }}"
        --expected-source-sha "${{ inputs.source-sha }}"
        --expected-digest "${{ inputs.pre-site-summary-artifact-digest }}"
        --expected-workflow-id 316435347
        --expected-workflow-path .github/workflows/release-receipt.yml
        --expected-event workflow_dispatch --expected-head-branch "${{ inputs.release-ref }}"
        --allow-running-current-run --max-attempts 1

    - name: Download only the exact plan artifact ID
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        artifact-ids: ${{ inputs.plan-artifact-id }}
        merge-multiple: true
        path: ${{ steps.paths.outputs.root }}/plan
        github-token: ${{ github.token }}
        repository: ${{ github.repository }}
        run-id: ${{ inputs.receipt-run-id }}

    - name: Download only the exact channel payload artifact ID
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        artifact-ids: ${{ inputs.payload-artifact-id }}
        merge-multiple: true
        path: ${{ steps.paths.outputs.root }}/payload
        github-token: ${{ github.token }}
        repository: ${{ github.repository }}
        run-id: ${{ inputs.receipt-run-id }}

    - name: Download only the exact pre-site summary artifact ID
      if: inputs.channel == 'rmux_io'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        artifact-ids: ${{ inputs.pre-site-summary-artifact-id }}
        merge-multiple: true
        path: ${{ steps.paths.outputs.root }}/pre-site
        github-token: ${{ github.token }}
        repository: ${{ github.repository }}
        run-id: ${{ inputs.receipt-run-id }}

    - name: Reject extra or symbolic channel inputs
      shell: bash
      env:
        RMUX_CHANNEL: ${{ inputs.channel }}
      run: |
        set -euo pipefail
        root="${{ steps.paths.outputs.root }}"
        scripts/release/verify-exact-file-set.py --root "$root/plan" \
          --file downstream-channel-plan.json \
          --file publication-receipt-predicate.json --file receipt-reference.json
        if [ "$RMUX_CHANNEL" = rmux_io ]; then
          scripts/release/verify-exact-file-set.py --root "$root/pre-site" \
            --file pre-site-channel-summary.json
        fi

    - name: Create and verify the exact payload and request documents
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        RMUX_CHANNEL: ${{ inputs.channel }}
        RMUX_RECEIPT_RUN_ID: ${{ inputs.receipt-run-id }}
        RMUX_PAYLOAD_ARTIFACT_ID: ${{ inputs.payload-artifact-id }}
        RMUX_SOURCE_SHA: ${{ inputs.source-sha }}
      run: |
        set -euo pipefail
        root="${{ steps.paths.outputs.root }}"
        scripts/release/actions-artifact.py resolve-id \
          --repository "$GITHUB_REPOSITORY" --run-id "$RMUX_RECEIPT_RUN_ID" \
          --artifact-id "$RMUX_PAYLOAD_ARTIFACT_ID" \
          --name "rmux-downstream-$RMUX_CHANNEL-payload-$RMUX_SOURCE_SHA-${{ inputs.release-id }}" \
          --expected-source-sha "$RMUX_SOURCE_SHA" --max-attempts 1 \
          --include-retention > "$root/payload-artifact.json"
        python3 - "$GITHUB_RUN_ID" "$RMUX_CHANNEL" "$root/producer.json" <<'PY'
        import json, pathlib, sys
        run_id, channel, output_path = sys.argv[1:]
        job_workflow_path = (
            ".github/workflows/release-rmux-io-payload.yml"
            if channel == "rmux_io"
            else ".github/workflows/release-downstream-prepare.yml"
        )
        value = {
            "run_id": int(run_id),
            "run_attempt": 1,
            "workflow_id": 316435347,
            "workflow_path": ".github/workflows/release-receipt.yml",
            "job_workflow_path": job_workflow_path,
            "runner_group_id": 0,
            "runner_group_name": "GitHub Actions",
            "runner_image": "ubuntu-22.04",
        }
        pathlib.Path(output_path).write_text(json.dumps(value, indent=2, sort_keys=True) + "\n", encoding="utf-8")
        PY
        created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        payload_common=(
          --receipt-reference "$root/plan/receipt-reference.json"
          --receipt-predicate "$root/plan/publication-receipt-predicate.json"
          --producer "$root/producer.json" --artifact-metadata "$root/payload-artifact.json"
          --channel "$RMUX_CHANNEL" --payload-dir "$root/payload" --infer-files
          --created-at "$created_at"
        )
        scripts/release/downstream_payload.py create "${payload_common[@]}" \
          --output "$root/channel-payload.json" \
          --subject-output "$root/downstream-channel-payload-subject.json"
        scripts/release/downstream_payload.py verify "${payload_common[@]}" \
          --document "$root/channel-payload.json" \
          --subject "$root/downstream-channel-payload-subject.json"
        expires_at="$(date -u -d '+1 hour' +%Y-%m-%dT%H:%M:%SZ)"
        request_common=(
          --plan "$root/plan/downstream-channel-plan.json" --channel "$RMUX_CHANNEL"
          --operation initial --payload-artifact "$root/channel-payload.json"
          --requested-at "$created_at" --expires-at "$expires_at"
        )
        if [ "$RMUX_CHANNEL" = rmux_io ]; then
          request_common+=(--pre-site-summary "$root/pre-site/pre-site-channel-summary.json")
        fi
        scripts/release/channel-request.py create "${request_common[@]}" \
          --output "$root/downstream-channel-request.json"
        scripts/release/channel-request.py verify "${request_common[@]}" \
          --document "$root/downstream-channel-request.json"
