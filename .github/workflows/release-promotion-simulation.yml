name: Release promotion simulation

on:
  workflow_dispatch:
    inputs:
      simulation_id:
        description: Unique nonpublishing simulation identifier
        required: true
        type: string
      candidate_run_id:
        required: true
        type: string
      candidate_manifest_run_id:
        required: true
        type: string
      candidate_manifest_artifact_id:
        required: true
        type: string
      candidate_manifest_artifact_digest:
        required: true
        type: string
      candidate_manifest_sha256:
        required: true
        type: string
      candidate_manifest_created_at:
        required: true
        type: string
      candidate_manifest_expires_at:
        required: true
        type: string
      expected_source_sha:
        required: true
        type: string
      release_intent_id:
        required: true
        type: string
      planned_release_ref:
        required: true
        type: string
      release_kind:
        required: true
        type: choice
        options: [rc, stable]
      release_policy_sha256:
        required: true
        type: string
      release_policy_contract_blob_oid:
        required: true
        type: string

permissions: {}

concurrency:
  group: rmux-release-promotion-simulation-${{ inputs.expected_source_sha }}
  cancel-in-progress: false

jobs:
  prepare-policy-audit:
    name: Prepare exact policy audit inputs
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/release-policy-audit.yml
    with:
      simulation: true
      candidate_run_id: ${{ inputs.candidate_run_id }}
      candidate_manifest_run_id: ${{ inputs.candidate_manifest_run_id }}
      candidate_manifest_artifact_id: ${{ inputs.candidate_manifest_artifact_id }}
      candidate_manifest_artifact_digest: ${{ inputs.candidate_manifest_artifact_digest }}
      candidate_manifest_sha256: ${{ inputs.candidate_manifest_sha256 }}
      candidate_manifest_created_at: ${{ inputs.candidate_manifest_created_at }}
      candidate_manifest_expires_at: ${{ inputs.candidate_manifest_expires_at }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_intent_id: ${{ inputs.release_intent_id }}
      planned_release_ref: ${{ inputs.planned_release_ref }}
      release_kind: ${{ inputs.release_kind }}
      release_policy_sha256: ${{ inputs.release_policy_sha256 }}
      release_policy_contract_blob_oid: ${{ inputs.release_policy_contract_blob_oid }}

  policy-audit:
    name: Audit exact live policy without publication authority
    needs: prepare-policy-audit
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: release-policy-audit
    permissions:
      actions: read
      contents: read
    outputs:
      policy_audit_reference_artifact_id: ${{ steps.audit.outputs.reference-artifact-id }}
      policy_audit_reference_artifact_digest: ${{ steps.audit.outputs.reference-artifact-digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false
          sparse-checkout: .github/actions/release-policy-audit

      - id: audit
        uses: ./.github/actions/release-policy-audit
        with:
          bundle-artifact-id: ${{ needs.prepare-policy-audit.outputs.bundle_artifact_id }}
          bundle-artifact-digest: ${{ needs.prepare-policy-audit.outputs.bundle_artifact_digest }}
          bundle-artifact-name: ${{ needs.prepare-policy-audit.outputs.bundle_artifact_name }}
          candidate-run-id: ${{ inputs.candidate_run_id }}
          candidate-manifest-run-id: ${{ inputs.candidate_manifest_run_id }}
          candidate-manifest-artifact-id: ${{ inputs.candidate_manifest_artifact_id }}
          candidate-manifest-artifact-digest: ${{ inputs.candidate_manifest_artifact_digest }}
          candidate-manifest-sha256: ${{ inputs.candidate_manifest_sha256 }}
          candidate-manifest-created-at: ${{ inputs.candidate_manifest_created_at }}
          candidate-manifest-expires-at: ${{ inputs.candidate_manifest_expires_at }}
          expected-source-sha: ${{ inputs.expected_source_sha }}
          release-intent-id: ${{ inputs.release_intent_id }}
          planned-release-ref: ${{ inputs.planned_release_ref }}
          release-kind: ${{ inputs.release_kind }}
          audit-workflow-id: 316591947
          audit-workflow-path: .github/workflows/release-promotion-simulation.yml
          audit-app-id: ${{ vars.RMUX_POLICY_AUDIT_APP_ID }}
          audit-app-private-key: ${{ secrets.RMUX_POLICY_AUDIT_APP_PRIVATE_KEY }}
          github-token: ${{ github.token }}

  verify-simulation:
    name: Exercise exact candidate promotion without publication
    needs: policy-audit
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    env:
      RMUX_SIMULATION_ID: ${{ inputs.simulation_id }}
      RMUX_EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
      RMUX_CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
      RMUX_RELEASE_INTENT_ID: ${{ inputs.release_intent_id }}
      RMUX_PLANNED_RELEASE_REF: ${{ inputs.planned_release_ref }}
      RMUX_RELEASE_KIND: ${{ inputs.release_kind }}
      RMUX_AUDIT_REFERENCE_ID: ${{ needs.policy-audit.outputs.policy_audit_reference_artifact_id }}
      RMUX_AUDIT_REFERENCE_DIGEST: ${{ needs.policy-audit.outputs.policy_audit_reference_artifact_digest }}
    steps:
      - name: Reject malformed or authoritative execution
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RMUX_SIMULATION_ID" =~ ^[A-Za-z0-9._:-]{8,128}$ ]]
          [[ "$RMUX_EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RMUX_CANDIDATE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RMUX_RELEASE_INTENT_ID" =~ ^[A-Za-z0-9._:-]{8,128}$ ]]
          [[ "$RMUX_PLANNED_RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]
          [[ "$RMUX_RELEASE_KIND" =~ ^(rc|stable)$ ]]
          [[ "$RMUX_AUDIT_REFERENCE_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RMUX_AUDIT_REFERENCE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_SHA" = "$RMUX_EXPECTED_SOURCE_SHA"
          test "$GITHUB_RUN_ATTEMPT" = 1

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Install pinned Draft 2020-12 schema validator
        shell: bash
        run: |
          set -euo pipefail
          validator="$RUNNER_TEMP/rmux-jsonschema"
          test "$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')" = 3.10
          python3 -m venv "$validator"
          "$validator/bin/python" -m pip install \
            --disable-pip-version-check \
            --no-deps \
            --only-binary=:all: \
            --require-hashes \
            --requirement .github/release/schema-validator-requirements.txt
          "$validator/bin/python" - <<'PY'
          import jsonschema

          if not hasattr(jsonschema, "Draft202012Validator"):
              raise SystemExit("jsonschema lacks Draft 2020-12 support")
          PY
          printf '%s\n' "$validator/bin" >> "$GITHUB_PATH"

      - name: Verify disarmed policy and exact audit reference artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          scripts/release/assert-release-capability.py policy_audit 2> "$RUNNER_TEMP/capability-error.txt" && exit 1
          grep -F "disabled until reviewed PR8" "$RUNNER_TEMP/capability-error.txt"
          python3 scripts/release/actions-artifact.py verify \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "$GITHUB_RUN_ID" \
            --artifact-id "$RMUX_AUDIT_REFERENCE_ID" \
            --name "rmux-policy-audit-reference-$GITHUB_RUN_ID" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --expected-digest "$RMUX_AUDIT_REFERENCE_DIGEST" \
            --max-attempts 1

      - name: Download only the exact audit reference
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.policy-audit.outputs.policy_audit_reference_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/rmux-promotion-simulation
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Verify and download the exact candidate manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 scripts/release/actions-artifact.py verify \
            --repository "$GITHUB_REPOSITORY" \
            --run-id "${{ inputs.candidate_manifest_run_id }}" \
            --artifact-id "${{ inputs.candidate_manifest_artifact_id }}" \
            --name "rmux-candidate-manifest-${{ inputs.candidate_run_id }}" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --expected-digest "${{ inputs.candidate_manifest_artifact_digest }}" \
            --expected-workflow-id 316223904 \
            --expected-workflow-path .github/workflows/release-shadow.yml \
            --expected-event workflow_dispatch \
            --expected-head-branch main \
            --max-attempts 1

      - name: Download only the exact candidate manifest ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.candidate_manifest_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/rmux-promotion-simulation/manifest
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_manifest_run_id }}

      - id: artifacts
        name: Resolve the eleven original candidate artifact IDs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          resolution="$RUNNER_TEMP/rmux-promotion-simulation/candidate-artifacts.json"
          scripts/release/verify-candidate-artifacts.py resolve \
            --repository "$GITHUB_REPOSITORY" \
            --candidate-run-id "$RMUX_CANDIDATE_RUN_ID" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --output "$resolution"
          ids=$(python3 - "$resolution" <<'PY'
          import json
          import pathlib
          import sys

          artifacts = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")).get("artifacts")
          if not isinstance(artifacts, list) or len(artifacts) != 11:
              raise SystemExit("simulation requires exactly eleven candidate artifacts")
          identifiers = [item.get("artifact_id") for item in artifacts]
          if any(type(value) is not int or value <= 0 for value in identifiers):
              raise SystemExit("candidate artifact ID is invalid")
          if len(set(identifiers)) != 11:
              raise SystemExit("candidate artifact IDs are not unique")
          print(",".join(str(value) for value in identifiers))
          PY
          )
          echo "artifact_ids=$ids" >> "$GITHUB_OUTPUT"

      - name: Download the eleven original candidate artifacts by exact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ steps.artifacts.outputs.artifact_ids }}
          path: ${{ runner.temp }}/rmux-promotion-simulation/candidate
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}

      - id: candidate
        name: Revalidate the original manifest and every candidate byte
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-promotion-simulation"
          manifest="$root/manifest/candidate-manifest.json"
          fast_run_id=$(python3 - "$manifest" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          raw = path.read_bytes()
          if hashlib.sha256(raw).hexdigest() != "${{ inputs.candidate_manifest_sha256 }}":
              raise SystemExit("candidate manifest digest differs")
          value = json.loads(raw)
          expected = {
              "source_git_sha": os.environ["RMUX_EXPECTED_SOURCE_SHA"],
              "candidate_run_id": int(os.environ["RMUX_CANDIDATE_RUN_ID"]),
              "release_intent_id": os.environ["RMUX_RELEASE_INTENT_ID"],
              "planned_release_ref": os.environ["RMUX_PLANNED_RELEASE_REF"],
              "release_kind": os.environ["RMUX_RELEASE_KIND"],
          }
          for field, wanted in expected.items():
              if value.get(field) != wanted:
                  raise SystemExit(f"candidate manifest {field} differs")
          run_id = value.get("fast_run_id")
          if type(run_id) is not int or run_id <= 0:
              raise SystemExit("candidate manifest fast run ID is invalid")
          print(run_id)
          PY
          )
          scripts/release/verify-candidate-artifacts.py verify-downloaded \
            --repository "$GITHUB_REPOSITORY" \
            --candidate-run-id "$RMUX_CANDIDATE_RUN_ID" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --fast-run-id "$fast_run_id" \
            --release-intent-id "$RMUX_RELEASE_INTENT_ID" \
            --planned-release-ref "$RMUX_PLANNED_RELEASE_REF" \
            --release-kind "$RMUX_RELEASE_KIND" \
            --resolution "$root/candidate-artifacts.json" \
            --downloads-dir "$root/candidate" \
            --output "$root/verified-candidate-artifacts.json"
          echo "fast_run_id=$fast_run_id" >> "$GITHUB_OUTPUT"

      - id: gh
        name: Install the pinned attestation verifier
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/rmux-promotion-simulation-gh"
          test ! -e "$install_root"
          scripts/release/install-gh-2.93.0.sh "$install_root"
          echo "binary=$install_root/gh" >> "$GITHUB_OUTPUT"

      - name: Verify build provenance and stage the exact release bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-promotion-simulation"
          scripts/release/verify-candidate-attestations.sh \
            "$root/candidate" "$RMUX_EXPECTED_SOURCE_SHA" "${{ steps.gh.outputs.binary }}"
          scripts/release/stage-candidate-release.py \
            --manifest "$root/manifest/candidate-manifest.json" \
            --resolution "$root/candidate-artifacts.json" \
            --downloads-dir "$root/candidate" \
            --candidate-run-id "$RMUX_CANDIDATE_RUN_ID" \
            --source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --output "$root/release-assets"

      - name: Verify the exact audit binding
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/rmux-promotion-simulation/policy-audit-reference.json" <<'PY'
          import json
          import os
          import pathlib
          import sys

          value = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          expected = {
              "status": "shadow-non-authoritative",
              "repository_id": 1239918790,
              "source_git_sha": os.environ["RMUX_EXPECTED_SOURCE_SHA"],
              "candidate_run_id": int(os.environ["RMUX_CANDIDATE_RUN_ID"]),
              "release_intent_id": os.environ["RMUX_RELEASE_INTENT_ID"],
              "policy_audit_run_id": int(os.environ["GITHUB_RUN_ID"]),
              "policy_audit_run_attempt": 1,
              "app_id": 4344532,
              "installation_id": 147749910,
              "workflow_id": 316591947,
              "workflow_path": ".github/workflows/release-promotion-simulation.yml",
          }
          for field, wanted in expected.items():
              if value.get(field) != wanted:
                  raise SystemExit(f"audit reference {field} differs")
          PY

      - name: Exercise authorization, publisher plan, receipt recovery, and drills
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-promotion-simulation"
          python3 scripts/release/promotion-simulation.py \
            --candidate-manifest "$root/manifest/candidate-manifest.json" \
            --candidate-resolution "$root/candidate-artifacts.json" \
            --verified-candidate-artifacts "$root/verified-candidate-artifacts.json" \
            --manifest-run-id "${{ inputs.candidate_manifest_run_id }}" \
            --manifest-artifact-id "${{ inputs.candidate_manifest_artifact_id }}" \
            --manifest-artifact-digest "${{ inputs.candidate_manifest_artifact_digest }}" \
            --manifest-sha256 "${{ inputs.candidate_manifest_sha256 }}" \
            --policy-audit-reference "$root/policy-audit-reference.json" \
            --staged-assets "$root/release-assets" \
            --simulation-id "$RMUX_SIMULATION_ID" \
            --simulation-run-id "$GITHUB_RUN_ID" \
            --output-dir "$root/e2e"
          python3 - "$root/e2e/promotion-simulation-record.json" <<'PY'
          import json
          import pathlib
          import sys

          value = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          expected = {
              "status": "nonpublishing-e2e-simulation",
              "publication_authority": False,
              "downstream_authority": False,
              "repository_mutations": False,
              "exact_candidate_bytes_exercised": True,
              "policy_audit_exercised": True,
              "promotion_authorization_exercised": True,
              "promotion_workflow_exercised": False,
              "github_publication_plan_exercised": True,
              "receipt_failure_exercised": True,
              "receipt_recovery_exercised": True,
              "receipt_workflow_exercised": False,
              "expired_audit_drill_exercised": True,
              "corrupt_asset_drill_exercised": True,
              "synthetic_tag_boundary": True,
              "synthetic_release_state": True,
              "cryptographic_tag_signature_exercised": False,
              "oidc_attestations_exercised": False,
          }
          for field, wanted in expected.items():
              if value.get(field) != wanted:
                  raise SystemExit(f"promotion simulation record {field} differs")
          PY

      - name: Run the static release contract regression suites
        run: |
          set -euo pipefail
          cargo test --locked \
            --test release_promotion_evidence_spec \
            --test release_github_publisher_spec \
            --test release_receipt_attestation_spec \
            --test release_promoter_workflows_spec

      - name: Upload the nonauthoritative simulation record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-promotion-simulation-${{ github.run_id }}
          path: ${{ runner.temp }}/rmux-promotion-simulation/e2e/promotion-simulation-record.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
