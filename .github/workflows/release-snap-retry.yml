name: Retry exact Snap candidate channel result

on:
  workflow_call:
    inputs:
      receipt_run_id: {required: true, type: string}
      receipt_run_workflow_id: {required: true, type: string}
      receipt_workflow_id: {required: true, type: string}
      receipt_artifact_id: {required: true, type: string}
      receipt_artifact_digest: {required: true, type: string}
      receipt_envelope_artifact_id: {required: true, type: string}
      receipt_envelope_artifact_digest: {required: true, type: string}
      receipt_predicate_sha256: {required: true, type: string}
      receipt_envelope_sha256: {required: true, type: string}
      prior_result_run_id: {required: true, type: string}
      prior_result_run_workflow_id: {required: true, type: string}
      prior_result_producer_workflow_id: {required: true, type: string}
      prior_result_producer_workflow_path: {required: true, type: string}
      prior_result_artifact_id: {required: true, type: string}
      prior_result_artifact_digest: {required: true, type: string}
      prior_result_predicate_sha256: {required: true, type: string}
      prior_result_envelope_artifact_id: {required: true, type: string}
      prior_result_envelope_artifact_digest: {required: true, type: string}
      prior_result_envelope_sha256: {required: true, type: string}
      request_idempotency_key: {required: true, type: string}
      expected_source_sha: {required: true, type: string}
      release_id: {required: true, type: string}
      release_ref: {required: true, type: string}
    outputs:
      result_reference_artifact_id:
        value: ${{ jobs.retry.outputs.result_reference_artifact_id }}
      result_reference_artifact_digest:
        value: ${{ jobs.retry.outputs.result_reference_artifact_digest }}

permissions: {}

jobs:
  prepare:
    name: Verify exact Snap candidate retry evidence
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    outputs:
      bundle_artifact_id: ${{ steps.prepare.outputs.artifact-id }}
      bundle_artifact_digest: ${{ steps.prepare.outputs.artifact-digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/release-channel-retry-prepare
        with:
          channel: snap_candidate
          receipt-run-id: ${{ inputs.receipt_run_id }}
          receipt-run-workflow-id: ${{ inputs.receipt_run_workflow_id }}
          receipt-workflow-id: ${{ inputs.receipt_workflow_id }}
          receipt-artifact-id: ${{ inputs.receipt_artifact_id }}
          receipt-artifact-digest: ${{ inputs.receipt_artifact_digest }}
          receipt-envelope-artifact-id: ${{ inputs.receipt_envelope_artifact_id }}
          receipt-envelope-artifact-digest: ${{ inputs.receipt_envelope_artifact_digest }}
          receipt-predicate-sha256: ${{ inputs.receipt_predicate_sha256 }}
          receipt-envelope-sha256: ${{ inputs.receipt_envelope_sha256 }}
          prior-result-run-id: ${{ inputs.prior_result_run_id }}
          prior-result-run-workflow-id: ${{ inputs.prior_result_run_workflow_id }}
          prior-result-producer-workflow-id: ${{ inputs.prior_result_producer_workflow_id }}
          prior-result-producer-workflow-path: ${{ inputs.prior_result_producer_workflow_path }}
          prior-result-artifact-id: ${{ inputs.prior_result_artifact_id }}
          prior-result-artifact-digest: ${{ inputs.prior_result_artifact_digest }}
          prior-result-predicate-sha256: ${{ inputs.prior_result_predicate_sha256 }}
          prior-result-envelope-artifact-id: ${{ inputs.prior_result_envelope_artifact_id }}
          prior-result-envelope-artifact-digest: ${{ inputs.prior_result_envelope_artifact_digest }}
          prior-result-envelope-sha256: ${{ inputs.prior_result_envelope_sha256 }}
          request-idempotency-key: ${{ inputs.request_idempotency_key }}
          source-sha: ${{ inputs.expected_source_sha }}
          release-id: ${{ inputs.release_id }}
          release-ref: ${{ inputs.release_ref }}

  retry:
    name: Retry exact Snap candidate payload once
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    environment: release
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    concurrency:
      group: rmux-channel-snap-candidate-${{ inputs.release_ref }}
      cancel-in-progress: false
    outputs:
      result_reference_artifact_id: ${{ steps.result.outputs.reference-artifact-id }}
      result_reference_artifact_digest: ${{ steps.result.outputs.reference-artifact-digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Verify exact prepared retry artifact identity
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          scripts/release/actions-artifact.py verify
          --repository "$GITHUB_REPOSITORY" --run-id "$GITHUB_RUN_ID"
          --artifact-id "${{ needs.prepare.outputs.bundle_artifact_id }}"
          --name "rmux-downstream-snap_candidate-retry-bundle-${{ inputs.expected_source_sha }}-${{ inputs.release_id }}"
          --expected-source-sha "${{ inputs.expected_source_sha }}"
          --expected-digest "${{ needs.prepare.outputs.bundle_artifact_digest }}"
          --max-attempts 1

      - name: Download only the exact prepared retry artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.prepare.outputs.bundle_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/rmux-snap-retry-prepared

      - name: Revalidate retry authority and original payload bytes
        run: |
          set -euo pipefail
          scripts/release/assert-release-capability.py downstream_channels
          scripts/release/prepare-channel-retry.py verify-prepared \
            --prepared "$RUNNER_TEMP/rmux-snap-retry-prepared" \
            --channel snap_candidate \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --release-id "${{ inputs.release_id }}" \
            --release-ref "${{ inputs.release_ref }}" \
            --idempotency-key "${{ inputs.request_idempotency_key }}"

      - id: decision
        name: Resolve exact Snap candidate retry authority
        run: >-
          scripts/release/channel-execution.py
          --request "$RUNNER_TEMP/rmux-snap-retry-prepared/downstream-channel-request.json"
          --channel snap_candidate
          --target-evidence "$RUNNER_TEMP/rmux-snap-retry-prepared/downstream-channel-target-evidence.json"
          --github-output "$GITHUB_OUTPUT"

      - id: writer
        name: Publish or verify exact original Snap candidate bytes
        if: steps.decision.outputs.execute == 'true'
        uses: ./.github/actions/release-snap-candidate-write
        with:
          payload-dir: ${{ runner.temp }}/rmux-snap-retry-prepared/payload
          release-ref: ${{ inputs.release_ref }}
          target-evidence: ${{ runner.temp }}/rmux-snap-retry-prepared/downstream-channel-target-evidence.json
          store-credentials: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - id: outcome
        name: Normalize exact Snap candidate retry outcome
        env:
          RMUX_EXECUTE: ${{ steps.decision.outputs.execute }}
          RMUX_EXECUTED_STATE: ${{ steps.writer.outputs.state }}
          RMUX_BLOCKED_STATE: ${{ steps.decision.outputs.state }}
          RMUX_EXECUTED_MUTATION: ${{ steps.writer.outputs.mutation_started }}
          RMUX_BLOCKED_MUTATION: ${{ steps.decision.outputs.mutation_started }}
          RMUX_EXECUTED_REMOTE_ID: ${{ steps.writer.outputs.remote_request_id }}
          RMUX_BLOCKED_REMOTE_ID: ${{ steps.decision.outputs.remote_request_id }}
        run: |
          set -euo pipefail
          if [ "$RMUX_EXECUTE" = true ]; then
            state="$RMUX_EXECUTED_STATE"; mutation="$RMUX_EXECUTED_MUTATION"; remote_id="$RMUX_EXECUTED_REMOTE_ID"
          else
            state="$RMUX_BLOCKED_STATE"; mutation="$RMUX_BLOCKED_MUTATION"; remote_id="$RMUX_BLOCKED_REMOTE_ID"
          fi
          test -n "$state" && [[ "$mutation" =~ ^(true|false)$ ]]
          echo "state=$state" >> "$GITHUB_OUTPUT"
          echo "mutation_started=$mutation" >> "$GITHUB_OUTPUT"
          echo "remote_request_id=$remote_id" >> "$GITHUB_OUTPUT"

      - id: result
        name: Seal exact Snap candidate retry result evidence
        uses: ./.github/actions/release-channel-result
        with:
          channel: snap_candidate
          prepared-root: ${{ runner.temp }}/rmux-snap-retry-prepared
          state: ${{ steps.outcome.outputs.state }}
          started-at: ${{ steps.decision.outputs.started_at }}
          mutation-started: ${{ steps.outcome.outputs.mutation_started }}
          remote-request-id: ${{ steps.outcome.outputs.remote_request_id }}
          target-evidence: ${{ runner.temp }}/rmux-snap-retry-prepared/downstream-channel-target-evidence.json
          source-sha: ${{ inputs.expected_source_sha }}
          release-id: ${{ inputs.release_id }}
          release-ref: ${{ inputs.release_ref }}
          producer-workflow-id: "316439354"
          producer-workflow-path: .github/workflows/release-snap-retry.yml
          runner-image: ubuntu-22.04
