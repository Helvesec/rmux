name: Downstream release channels

on:
  workflow_call:
    inputs:
      receipt_run_id: {required: true, type: string}
      receipt_run_workflow_id: {required: true, type: string}
      receipt_workflow_id: {required: true, type: string}
      receipt_artifact_id: {required: true, type: string}
      receipt_artifact_digest: {required: true, type: string}
      receipt_envelope_artifact_id: {required: true, type: string}
      receipt_envelope_artifact_digest: {required: true, type: string}
      receipt_predicate_sha256: {required: true, type: string}
      receipt_envelope_sha256: {required: true, type: string}
      expected_source_sha: {required: true, type: string}
      release_id: {required: true, type: string}
      release_ref: {required: true, type: string}
      release_kind: {required: true, type: string}
      snap_candidate_opt_in: {required: false, type: boolean, default: false}
    outputs:
      plan_artifact_id:
        value: ${{ jobs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest:
        value: ${{ jobs.prepare-plan.outputs.plan_artifact_digest }}

permissions: {}

jobs:
  prepare-plan:
    name: Prepare non-authoritative downstream plan
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      plan_artifact_id: ${{ steps.plan-upload.outputs.artifact-id }}
      plan_artifact_digest: sha256:${{ steps.plan-upload.outputs.artifact-digest }}
    env:
      RMUX_RECEIPT_RUN_ID: ${{ inputs.receipt_run_id }}
      RMUX_RECEIPT_RUN_WORKFLOW_ID: ${{ inputs.receipt_run_workflow_id }}
      RMUX_RECEIPT_WORKFLOW_ID: ${{ inputs.receipt_workflow_id }}
      RMUX_RECEIPT_ARTIFACT_ID: ${{ inputs.receipt_artifact_id }}
      RMUX_RECEIPT_ARTIFACT_DIGEST: ${{ inputs.receipt_artifact_digest }}
      RMUX_RECEIPT_ENVELOPE_ARTIFACT_ID: ${{ inputs.receipt_envelope_artifact_id }}
      RMUX_RECEIPT_ENVELOPE_ARTIFACT_DIGEST: ${{ inputs.receipt_envelope_artifact_digest }}
      RMUX_RECEIPT_PREDICATE_SHA256: ${{ inputs.receipt_predicate_sha256 }}
      RMUX_RECEIPT_ENVELOPE_SHA256: ${{ inputs.receipt_envelope_sha256 }}
      RMUX_EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
      RMUX_RELEASE_ID: ${{ inputs.release_id }}
      RMUX_RELEASE_REF: ${{ inputs.release_ref }}
      RMUX_RELEASE_KIND: ${{ inputs.release_kind }}
      RMUX_SNAP_CANDIDATE_OPT_IN: ${{ inputs.snap_candidate_opt_in }}
    steps:
      - name: Reject malformed downstream inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "Helvesec/rmux"
          test "$GITHUB_REPOSITORY_ID" = "1239918790"
          for value in "$RMUX_RECEIPT_RUN_ID" "$RMUX_RECEIPT_RUN_WORKFLOW_ID" "$RMUX_RECEIPT_WORKFLOW_ID" "$RMUX_RECEIPT_ARTIFACT_ID" "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_ID" "$RMUX_RELEASE_ID"; do
            [[ "$value" =~ ^[1-9][0-9]*$ ]]
          done
          test "$RMUX_RECEIPT_RUN_WORKFLOW_ID" = "$RMUX_RECEIPT_WORKFLOW_ID"
          [[ "$RMUX_RECEIPT_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$RMUX_RECEIPT_PREDICATE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RMUX_RECEIPT_ENVELOPE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RMUX_EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RMUX_RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]
          [[ "$RMUX_RELEASE_KIND" =~ ^(rc|stable)$ ]]
          if [ "$RMUX_RELEASE_KIND" = rc ]; then
            [[ "$RMUX_RELEASE_REF" =~ -rc\.[0-9]+$ ]]
          else
            [[ "$RMUX_RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          fi
          test "$GITHUB_RUN_ATTEMPT" = 1

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Verify exact receipt artifacts and producer run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-downstream"
          mkdir -p "$root"
          python3 scripts/release/actions-artifact.py verify \
            --repository "$GITHUB_REPOSITORY" --run-id "$RMUX_RECEIPT_RUN_ID" \
            --artifact-id "$RMUX_RECEIPT_ARTIFACT_ID" \
            --name "rmux-publication-receipt-$RMUX_EXPECTED_SOURCE_SHA-$RMUX_RELEASE_ID" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --expected-digest "$RMUX_RECEIPT_ARTIFACT_DIGEST" \
            --expected-workflow-id "$RMUX_RECEIPT_RUN_WORKFLOW_ID" \
            --expected-workflow-path .github/workflows/release-receipt.yml \
            --expected-event workflow_dispatch --expected-head-branch "$RMUX_RELEASE_REF" \
            --allow-running-current-run --max-attempts 1 > "$root/receipt-artifact.json"
          python3 scripts/release/actions-artifact.py verify \
            --repository "$GITHUB_REPOSITORY" --run-id "$RMUX_RECEIPT_RUN_ID" \
            --artifact-id "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_ID" \
            --name "rmux-publication-receipt-envelope-$RMUX_EXPECTED_SOURCE_SHA-$RMUX_RELEASE_ID" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --expected-digest "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_DIGEST" \
            --expected-workflow-id "$RMUX_RECEIPT_RUN_WORKFLOW_ID" \
            --expected-workflow-path .github/workflows/release-receipt.yml \
            --expected-event workflow_dispatch --expected-head-branch "$RMUX_RELEASE_REF" \
            --allow-running-current-run --max-attempts 1 > "$root/envelope-artifact.json"

      - name: Download only the exact receipt predicate bundle ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.receipt_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/rmux-downstream/receipt
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.receipt_run_id }}

      - name: Download only the exact receipt envelope ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.receipt_envelope_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/rmux-downstream/envelope
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.receipt_run_id }}

      - id: gh
        name: Install the pinned receipt attestation verifier
        shell: bash
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/rmux-gh-2.93.0"
          scripts/release/install-gh-2.93.0.sh "$install_root"
          echo "binary=$install_root/gh" >> "$GITHUB_OUTPUT"

      - name: Verify the exact signed receipt subject
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/release/verify-receipt-attestation.py
          --gh "${{ steps.gh.outputs.binary }}"
          --release-state "$RUNNER_TEMP/rmux-downstream/receipt/release-state.json"
          --bundle "$RUNNER_TEMP/rmux-downstream/receipt/publication-receipt.sigstore.json"
          --predicate "$RUNNER_TEMP/rmux-downstream/receipt/publication-receipt-predicate.json"
          --source-sha "$RMUX_EXPECTED_SOURCE_SHA"
          --release-ref "$RMUX_RELEASE_REF"

      - name: Assert active downstream authority
        run: scripts/release/assert-release-capability.py downstream_channels

      - name: Bind exact authorized receipt evidence
        shell: bash
        run: >-
          scripts/release/build-downstream-receipt-reference.py
          --predicate "$RUNNER_TEMP/rmux-downstream/receipt/publication-receipt-predicate.json"
          --bundle "$RUNNER_TEMP/rmux-downstream/receipt/publication-receipt.sigstore.json"
          --envelope "$RUNNER_TEMP/rmux-downstream/envelope/publication-receipt-envelope.json"
          --predicate-artifact "$RUNNER_TEMP/rmux-downstream/receipt-artifact.json"
          --envelope-artifact "$RUNNER_TEMP/rmux-downstream/envelope-artifact.json"
          --source-sha "$RMUX_EXPECTED_SOURCE_SHA" --release-id "$RMUX_RELEASE_ID"
          --release-ref "$RMUX_RELEASE_REF" --release-kind "$RMUX_RELEASE_KIND"
          --receipt-run-id "$RMUX_RECEIPT_RUN_ID"
          --receipt-workflow-id "$RMUX_RECEIPT_WORKFLOW_ID"
          --predicate-sha256 "$RMUX_RECEIPT_PREDICATE_SHA256"
          --envelope-sha256 "$RMUX_RECEIPT_ENVELOPE_SHA256"
          --output "$RUNNER_TEMP/rmux-downstream/receipt-reference.json"

      - name: Create and verify the default-deny channel plan
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-downstream"
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          common=(
            --receipt-reference "$root/receipt-reference.json"
            --release-kind "$RMUX_RELEASE_KIND"
            --created-at "$created_at"
          )
          if [ "$RMUX_SNAP_CANDIDATE_OPT_IN" = true ]; then
            common+=(--snap-candidate-opt-in)
          fi
          python3 scripts/release/channel-policy.py create-plan \
            "${common[@]}" --output "$root/downstream-channel-plan.json"
          python3 scripts/release/channel-policy.py verify-plan \
            "${common[@]}" --document "$root/downstream-channel-plan.json"

      - id: plan-upload
        name: Upload the non-authoritative plan and exact receipt reference
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-downstream-plan-${{ inputs.expected_source_sha }}-${{ inputs.release_id }}
          path: |
            ${{ runner.temp }}/rmux-downstream/downstream-channel-plan.json
            ${{ runner.temp }}/rmux-downstream/receipt/publication-receipt-predicate.json
            ${{ runner.temp }}/rmux-downstream/receipt-reference.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  audit-downstream-authority:
    name: Audit live downstream repository authority
    needs: prepare-plan
    uses: ./.github/workflows/release-downstream-audit.yml
    permissions:
      contents: read
    with:
      expected_source_sha: ${{ inputs.expected_source_sha }}

  prepare-payloads:
    name: Prepare exact downstream payloads
    needs: [prepare-plan, audit-downstream-authority]
    uses: ./.github/workflows/release-downstream-prepare.yml
    permissions:
      actions: read
      contents: read
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}
      release_kind: ${{ inputs.release_kind }}

  build-linux-repository:
    name: Build exact signed Linux repository trees
    needs: [prepare-plan, prepare-payloads]
    if: inputs.release_kind == 'stable'
    uses: ./.github/workflows/release-linux-repository-build.yml
    permissions:
      actions: read
      contents: read
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).apt_rpm }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).apt_rpm }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  publish-homebrew-tap:
    name: Publish exact Homebrew tap formula
    needs: [prepare-plan, prepare-payloads]
    uses: ./.github/workflows/release-owned-repository-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      channel: homebrew_tap
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).homebrew_tap }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).homebrew_tap }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  publish-scoop:
    name: Publish exact Scoop manifest
    needs: [prepare-plan, prepare-payloads]
    uses: ./.github/workflows/release-owned-repository-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      channel: scoop
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).scoop }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).scoop }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  publish-web-share:
    name: Publish exact Web Share WASM bytes
    needs: [prepare-plan, prepare-payloads]
    uses: ./.github/workflows/release-owned-repository-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      channel: web_share
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).web_share }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).web_share }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  publish-linux-repository:
    name: Publish exact signed APT and RPM repositories
    needs: [prepare-plan, prepare-payloads, build-linux-repository, publish-homebrew-tap, publish-scoop, publish-web-share]
    if: ${{ !cancelled() && !failure() && inputs.release_kind == 'stable' }}
    uses: ./.github/workflows/release-linux-repository-publish.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).apt_rpm }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).apt_rpm }}
      repository_artifact_id: ${{ needs.build-linux-repository.outputs.repository_artifact_id }}
      repository_artifact_digest: ${{ needs.build-linux-repository.outputs.repository_artifact_digest }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  record-linux-repository-policy:
    name: Record denied RC Linux repository channel
    needs: [prepare-plan, prepare-payloads, build-linux-repository, publish-homebrew-tap, publish-scoop, publish-web-share]
    if: ${{ !cancelled() && !failure() && inputs.release_kind == 'rc' }}
    uses: ./.github/workflows/release-policy-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      channel: apt_rpm
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).apt_rpm }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).apt_rpm }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  publish-crates:
    name: Publish exact crates.io package set
    needs: [prepare-plan, prepare-payloads, build-linux-repository, publish-homebrew-tap, publish-scoop, publish-web-share]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/release-crates-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).crates_io }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).crates_io }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  record-homebrew-core:
    name: Record manual Homebrew Core submission
    needs: [prepare-plan, prepare-payloads, publish-linux-repository, record-linux-repository-policy, publish-crates]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/release-policy-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      channel: homebrew_core
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).homebrew_core }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).homebrew_core }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  record-winget:
    name: Record manual WinGet submission
    needs: [prepare-plan, prepare-payloads, publish-linux-repository, record-linux-repository-policy, publish-crates]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/release-policy-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      channel: winget
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).winget }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).winget }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  record-snap-stable:
    name: Record disabled Snap stable channel
    needs: [prepare-plan, prepare-payloads, publish-linux-repository, record-linux-repository-policy, publish-crates]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/release-policy-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      channel: snap_stable
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).snap_stable }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).snap_stable }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  publish-chocolatey:
    name: Submit exact Chocolatey package
    needs: [prepare-plan, prepare-payloads, publish-linux-repository, record-linux-repository-policy, publish-crates]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/release-chocolatey-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).chocolatey }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).chocolatey }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  publish-snap-candidate:
    name: Publish exact Snap candidate revisions
    needs: [prepare-plan, prepare-payloads, record-homebrew-core, record-winget, record-snap-stable, publish-chocolatey]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/release-snap-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_ids).snap_candidate }}
      payload_artifact_digest: ${{ fromJSON(needs.prepare-payloads.outputs.payload_artifact_digests).snap_candidate }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  pre-site-summary:
    name: Aggregate ten exact pre-site results
    needs: [prepare-plan, publish-homebrew-tap, publish-scoop, publish-web-share, publish-linux-repository, record-linux-repository-policy, publish-crates, record-homebrew-core, record-winget, record-snap-stable, publish-chocolatey, publish-snap-candidate]
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/release-channel-summary.yml
    permissions:
      actions: read
      contents: read
    with:
      phase: pre-site
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  prepare-rmux-io-handoff:
    name: Prepare manual rmux.io handoff
    needs: [prepare-plan, pre-site-summary]
    uses: ./.github/workflows/release-rmux-io-payload.yml
    permissions:
      actions: read
      contents: read
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      pre_site_artifact_id: ${{ needs.pre-site-summary.outputs.summary_artifact_id }}
      pre_site_artifact_digest: ${{ needs.pre-site-summary.outputs.summary_artifact_digest }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  record-rmux-io-handoff:
    name: Record blocked automated rmux.io update
    needs: [prepare-plan, pre-site-summary, prepare-rmux-io-handoff]
    uses: ./.github/workflows/release-rmux-io-channel.yml
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    with:
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      payload_artifact_id: ${{ needs.prepare-rmux-io-handoff.outputs.payload_artifact_id }}
      payload_artifact_digest: ${{ needs.prepare-rmux-io-handoff.outputs.payload_artifact_digest }}
      pre_site_artifact_id: ${{ needs.pre-site-summary.outputs.summary_artifact_id }}
      pre_site_artifact_digest: ${{ needs.pre-site-summary.outputs.summary_artifact_digest }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}

  final-channel-summary:
    name: Aggregate all eleven exact channel results
    needs: [prepare-plan, pre-site-summary, record-rmux-io-handoff]
    uses: ./.github/workflows/release-channel-summary.yml
    permissions:
      actions: read
      contents: read
    with:
      phase: final
      receipt_run_id: ${{ inputs.receipt_run_id }}
      plan_artifact_id: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest: ${{ needs.prepare-plan.outputs.plan_artifact_digest }}
      expected_source_sha: ${{ inputs.expected_source_sha }}
      release_id: ${{ inputs.release_id }}
      release_ref: ${{ inputs.release_ref }}
      pre_site_artifact_id: ${{ needs.pre-site-summary.outputs.summary_artifact_id }}
      pre_site_artifact_digest: ${{ needs.pre-site-summary.outputs.summary_artifact_digest }}
