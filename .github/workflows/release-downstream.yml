name: Disarmed downstream release channels

on:
  workflow_call:
    inputs:
      receipt_run_id: {required: true, type: string}
      receipt_run_workflow_id: {required: true, type: string}
      receipt_workflow_id: {required: true, type: string}
      receipt_artifact_id: {required: true, type: string}
      receipt_artifact_digest: {required: true, type: string}
      receipt_envelope_artifact_id: {required: true, type: string}
      receipt_envelope_artifact_digest: {required: true, type: string}
      receipt_predicate_sha256: {required: true, type: string}
      receipt_envelope_sha256: {required: true, type: string}
      expected_source_sha: {required: true, type: string}
      release_id: {required: true, type: string}
      release_ref: {required: true, type: string}
      release_kind: {required: true, type: string}
      snap_candidate_opt_in: {required: false, type: boolean, default: false}
    outputs:
      plan_artifact_id:
        value: ${{ jobs.prepare-plan.outputs.plan_artifact_id }}
      plan_artifact_digest:
        value: ${{ jobs.prepare-plan.outputs.plan_artifact_digest }}

permissions: {}

jobs:
  prepare-plan:
    name: Prepare non-authoritative downstream plan
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    outputs:
      plan_artifact_id: ${{ steps.plan-upload.outputs.artifact-id }}
      plan_artifact_digest: sha256:${{ steps.plan-upload.outputs.artifact-digest }}
    env:
      RMUX_RECEIPT_RUN_ID: ${{ inputs.receipt_run_id }}
      RMUX_RECEIPT_RUN_WORKFLOW_ID: ${{ inputs.receipt_run_workflow_id }}
      RMUX_RECEIPT_WORKFLOW_ID: ${{ inputs.receipt_workflow_id }}
      RMUX_RECEIPT_ARTIFACT_ID: ${{ inputs.receipt_artifact_id }}
      RMUX_RECEIPT_ARTIFACT_DIGEST: ${{ inputs.receipt_artifact_digest }}
      RMUX_RECEIPT_ENVELOPE_ARTIFACT_ID: ${{ inputs.receipt_envelope_artifact_id }}
      RMUX_RECEIPT_ENVELOPE_ARTIFACT_DIGEST: ${{ inputs.receipt_envelope_artifact_digest }}
      RMUX_RECEIPT_PREDICATE_SHA256: ${{ inputs.receipt_predicate_sha256 }}
      RMUX_RECEIPT_ENVELOPE_SHA256: ${{ inputs.receipt_envelope_sha256 }}
      RMUX_EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
      RMUX_RELEASE_ID: ${{ inputs.release_id }}
      RMUX_RELEASE_REF: ${{ inputs.release_ref }}
      RMUX_RELEASE_KIND: ${{ inputs.release_kind }}
      RMUX_SNAP_CANDIDATE_OPT_IN: ${{ inputs.snap_candidate_opt_in }}
    steps:
      - name: Reject malformed downstream inputs
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "Helvesec/rmux"
          test "$GITHUB_REPOSITORY_ID" = "1239918790"
          for value in "$RMUX_RECEIPT_RUN_ID" "$RMUX_RECEIPT_RUN_WORKFLOW_ID" "$RMUX_RECEIPT_WORKFLOW_ID" "$RMUX_RECEIPT_ARTIFACT_ID" "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_ID" "$RMUX_RELEASE_ID"; do
            [[ "$value" =~ ^[1-9][0-9]*$ ]]
          done
          test "$RMUX_RECEIPT_RUN_WORKFLOW_ID" = "$RMUX_RECEIPT_WORKFLOW_ID"
          [[ "$RMUX_RECEIPT_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$RMUX_RECEIPT_PREDICATE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RMUX_RECEIPT_ENVELOPE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RMUX_EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RMUX_RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]
          [[ "$RMUX_RELEASE_KIND" =~ ^(rc|stable)$ ]]
          if [ "$RMUX_RELEASE_KIND" = rc ]; then
            [[ "$RMUX_RELEASE_REF" =~ -rc\.[0-9]+$ ]]
          else
            [[ "$RMUX_RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          fi
          test "$GITHUB_RUN_ATTEMPT" = 1

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Verify exact receipt artifacts and producer run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-downstream"
          mkdir -p "$root"
          python3 scripts/release/actions-artifact.py verify \
            --repository "$GITHUB_REPOSITORY" --run-id "$RMUX_RECEIPT_RUN_ID" \
            --artifact-id "$RMUX_RECEIPT_ARTIFACT_ID" \
            --name "rmux-publication-receipt-$RMUX_EXPECTED_SOURCE_SHA-$RMUX_RELEASE_ID" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --expected-digest "$RMUX_RECEIPT_ARTIFACT_DIGEST" \
            --expected-workflow-id "$RMUX_RECEIPT_RUN_WORKFLOW_ID" \
            --expected-workflow-path .github/workflows/release-receipt.yml \
            --expected-event workflow_dispatch --expected-head-branch "$RMUX_RELEASE_REF" \
            --max-attempts 1 > "$root/receipt-artifact.json"
          python3 scripts/release/actions-artifact.py verify \
            --repository "$GITHUB_REPOSITORY" --run-id "$RMUX_RECEIPT_RUN_ID" \
            --artifact-id "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_ID" \
            --name "rmux-publication-receipt-envelope-$RMUX_EXPECTED_SOURCE_SHA-$RMUX_RELEASE_ID" \
            --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --expected-digest "$RMUX_RECEIPT_ENVELOPE_ARTIFACT_DIGEST" \
            --expected-workflow-id "$RMUX_RECEIPT_RUN_WORKFLOW_ID" \
            --expected-workflow-path .github/workflows/release-receipt.yml \
            --expected-event workflow_dispatch --expected-head-branch "$RMUX_RELEASE_REF" \
            --max-attempts 1 > "$root/envelope-artifact.json"

      - name: Download only the exact receipt predicate bundle ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.receipt_artifact_id }}
          path: ${{ runner.temp }}/rmux-downstream/receipt
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.receipt_run_id }}

      - name: Download only the exact receipt envelope ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.receipt_envelope_artifact_id }}
          path: ${{ runner.temp }}/rmux-downstream/envelope
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.receipt_run_id }}

      - id: gh
        name: Install the pinned receipt attestation verifier
        shell: bash
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/rmux-gh-2.93.0"
          scripts/release/install-gh-2.93.0.sh "$install_root"
          echo "binary=$install_root/gh" >> "$GITHUB_OUTPUT"

      - name: Verify the exact signed receipt subject
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/release/verify-receipt-attestation.py
          --gh "${{ steps.gh.outputs.binary }}"
          --release-state "$RUNNER_TEMP/rmux-downstream/receipt/release-state.json"
          --bundle "$RUNNER_TEMP/rmux-downstream/receipt/publication-receipt.sigstore.json"
          --predicate "$RUNNER_TEMP/rmux-downstream/receipt/publication-receipt-predicate.json"
          --source-sha "$RMUX_EXPECTED_SOURCE_SHA"
          --release-ref "$RMUX_RELEASE_REF"

      - name: Bind exact disarmed receipt evidence
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-downstream"
          python3 - \
            "$root/receipt/publication-receipt-predicate.json" \
            "$root/receipt/publication-receipt.sigstore.json" \
            "$root/envelope/publication-receipt-envelope.json" \
            "$root/receipt-artifact.json" "$root/envelope-artifact.json" \
            "$root/receipt-reference.json" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys

          predicate_path, bundle_path, envelope_path, receipt_meta_path, envelope_meta_path, output_path = map(pathlib.Path, sys.argv[1:])
          expected_files = {
              predicate_path.parent: {
                  "publication-receipt-predicate.json",
                  "publication-receipt.sigstore.json",
                  "release-state.json",
              },
              envelope_path.parent: {"publication-receipt-envelope.json"},
          }
          for root, expected in expected_files.items():
              paths = list(root.rglob("*"))
              if any(path.is_symlink() for path in paths):
                  raise SystemExit("receipt artifact contains a symlink")
              names = {path.relative_to(root).as_posix() for path in paths if path.is_file()}
              if names != expected:
                  raise SystemExit(f"receipt artifact file set differs: {sorted(names)}")
          predicate = json.loads(predicate_path.read_text(encoding="utf-8"))
          envelope = json.loads(envelope_path.read_text(encoding="utf-8"))
          receipt_meta = json.loads(receipt_meta_path.read_text(encoding="utf-8"))
          envelope_meta = json.loads(envelope_meta_path.read_text(encoding="utf-8"))
          file_hash = lambda path: hashlib.sha256(path.read_bytes()).hexdigest()
          source = os.environ["RMUX_EXPECTED_SOURCE_SHA"]
          release_id = int(os.environ["RMUX_RELEASE_ID"])
          release_ref = os.environ["RMUX_RELEASE_REF"]
          release_kind = os.environ["RMUX_RELEASE_KIND"]
          receipt = predicate.get("receipt", {})
          release = predicate.get("release", {})
          if predicate.get("status") != "disarmed-non-authoritative" or predicate.get("downstream_authority") is not False:
              raise SystemExit("receipt predicate acquired downstream authority")
          if predicate.get("repository_id") != 1239918790 or predicate.get("source_git_sha") != source:
              raise SystemExit("receipt predicate repository or source differs")
          if release.get("id") != release_id or release.get("ref") != release_ref or release.get("kind") != release_kind or release.get("immutable") is not True:
              raise SystemExit("receipt release identity differs")
          expected_receipt = {
              "run_id": int(os.environ["RMUX_RECEIPT_RUN_ID"]),
              "run_attempt": 1,
              "workflow_id": int(os.environ["RMUX_RECEIPT_WORKFLOW_ID"]),
              "workflow_path": ".github/workflows/release-receipt.yml",
          }
          if receipt != expected_receipt:
              raise SystemExit("receipt producer identity differs")
          predicate_sha = file_hash(predicate_path)
          envelope_sha = file_hash(envelope_path)
          if predicate_sha != os.environ["RMUX_RECEIPT_PREDICATE_SHA256"] or envelope_sha != os.environ["RMUX_RECEIPT_ENVELOPE_SHA256"]:
              raise SystemExit("receipt document digest differs")
          expected_bundle = {
              "artifact_id": receipt_meta["artifact_id"],
              "name": receipt_meta["name"],
              "archive_digest": receipt_meta["digest"],
              "size_in_bytes": receipt_meta["size_in_bytes"],
          }
          if envelope.get("status") != "disarmed-non-authoritative" or envelope.get("downstream_authority") is not False:
              raise SystemExit("receipt envelope acquired downstream authority")
          if envelope.get("source_git_sha") != source or envelope.get("release_id") != release_id or envelope.get("release_ref") != release_ref or envelope.get("receipt") != receipt:
              raise SystemExit("receipt envelope identity differs")
          if envelope.get("predicate_sha256") != predicate_sha or envelope.get("receipt_bundle") != expected_bundle:
              raise SystemExit("receipt envelope predicate or artifact binding differs")
          attestation = envelope.get("attestation", {})
          if attestation.get("bundle_file") != "publication-receipt.sigstore.json" or attestation.get("bundle_sha256") != file_hash(bundle_path):
              raise SystemExit("receipt attestation bundle differs")
          reference = {
              "schema_version": 1,
              "status": "disarmed-non-authoritative",
              "downstream_authority": False,
              "repository_id": 1239918790,
              "source_git_sha": source,
              "release": {
                  "id": release_id,
                  "ref": release_ref,
                  "intent_id": release["intent_id"],
                  "kind": release_kind,
                  "tag_object_sha": release["tag_object_sha"],
                  "immutable": True,
              },
              "receipt": receipt,
              "predicate_bundle": expected_bundle,
              "predicate_sha256": predicate_sha,
              "envelope_bundle": {
                  "artifact_id": envelope_meta["artifact_id"],
                  "name": envelope_meta["name"],
                  "archive_digest": envelope_meta["digest"],
                  "size_in_bytes": envelope_meta["size_in_bytes"],
              },
              "envelope_sha256": envelope_sha,
              "attestation": attestation,
              "verified_at": predicate["verified_at"],
          }
          output_path.write_text(json.dumps(reference, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Create and verify the default-deny channel plan
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-downstream"
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          common=(
            --receipt-reference "$root/receipt-reference.json"
            --release-kind "$RMUX_RELEASE_KIND"
            --created-at "$created_at"
          )
          if [ "$RMUX_SNAP_CANDIDATE_OPT_IN" = true ]; then
            common+=(--snap-candidate-opt-in)
          fi
          python3 scripts/release/channel-policy.py create-plan \
            "${common[@]}" --output "$root/downstream-channel-plan.json"
          python3 scripts/release/channel-policy.py verify-plan \
            "${common[@]}" --document "$root/downstream-channel-plan.json"

      - id: plan-upload
        name: Upload the non-authoritative plan and exact receipt reference
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-downstream-plan-${{ inputs.expected_source_sha }}-${{ inputs.release_id }}
          path: |
            ${{ runner.temp }}/rmux-downstream/downstream-channel-plan.json
            ${{ runner.temp }}/rmux-downstream/receipt-reference.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  stage-linux-channels:
    name: Disabled channel ${{ matrix.channel }}
    needs: prepare-plan
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    concurrency:
      group: rmux-channel-${{ matrix.channel }}-${{ inputs.release_ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      # Three Linux workers plus the dedicated Chocolatey worker keep the
      # downstream fanout within the four-channel contract.
      max-parallel: 3
      matrix:
        channel:
          - apt_rpm
          - crates_io
          - homebrew_core
          - homebrew_tap
          - scoop
          - snap_candidate
          - snap_stable
          - web_share
          - winget
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Fail closed before any downstream mutation
        run: scripts/release/assert-release-capability.py downstream_channels

      - name: Refuse the unimplemented channel writer
        shell: bash
        run: |
          echo "PR7 does not implement an active writer for ${{ matrix.channel }}" >&2
          exit 1

  stage-chocolatey:
    name: Disabled channel chocolatey
    needs: prepare-plan
    if: ${{ false }}
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    concurrency:
      group: rmux-channel-chocolatey-${{ inputs.release_ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Fail closed before any Chocolatey mutation
        shell: pwsh
        run: python scripts/release/assert-release-capability.py downstream_channels

      - name: Refuse the unimplemented Chocolatey writer
        shell: pwsh
        run: throw "PR7 does not implement an active Chocolatey writer"

  channel-summary:
    name: Disabled pre-site result aggregation
    needs: [prepare-plan, stage-linux-channels, stage-chocolatey]
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Download only the exact disarmed plan artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
          path: ${{ runner.temp }}/rmux-downstream-summary

      - name: Fail closed before consuming incomplete channel results
        run: scripts/release/assert-release-capability.py downstream_channels

      - name: Reject unavailable pre-site result aggregation
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-downstream-summary"
          mkdir -p "$root"
          # Result aggregation is unavailable in PR7 because no writer emits
          # result pairs. The canonical validator therefore fails closed.
          python3 scripts/release/channel-summary.py create \
            --plan "$root/downstream-channel-plan.json" \
            --created-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output "$root/pre-site-channel-summary.json"

  deploy-rmux-io:
    name: Disabled post-aggregation rmux.io deployment
    needs: [prepare-plan, channel-summary]
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    concurrency:
      group: rmux-channel-rmux-io-${{ inputs.release_ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Fail closed before the final site mutation
        run: scripts/release/assert-release-capability.py downstream_channels

      - name: Refuse the unimplemented final site writer
        shell: bash
        run: |
          echo "rmux.io remains unavailable and disabled until reviewed cut-over" >&2
          exit 1

  final-channel-summary:
    name: Disabled final result aggregation
    needs: [prepare-plan, channel-summary, deploy-rmux-io]
    if: ${{ false }}
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - name: Download only the exact disarmed plan artifact ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.prepare-plan.outputs.plan_artifact_id }}
          path: ${{ runner.temp }}/rmux-downstream-summary

      - name: Fail closed before consuming incomplete channel results
        run: scripts/release/assert-release-capability.py downstream_channels

      - name: Reject unavailable final result aggregation
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/rmux-downstream-summary"
          mkdir -p "$root"
          # Final result aggregation is unavailable in PR7. With no exact result
          # pairs, the canonical validator intentionally rejects this path.
          python3 scripts/release/channel-summary.py create \
            --plan "$root/downstream-channel-plan.json" \
            --created-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --output "$root/final-channel-summary.json"
