name: Disarmed reusable release policy audit

on:
  workflow_call:
    secrets:
      RMUX_POLICY_AUDIT_APP_PRIVATE_KEY:
        required: true
    inputs:
      simulation:
        required: false
        type: boolean
        default: false
      candidate_run_id:
        required: true
        type: string
      candidate_manifest_run_id:
        required: true
        type: string
      candidate_manifest_artifact_id:
        required: true
        type: string
      candidate_manifest_artifact_digest:
        required: true
        type: string
      candidate_manifest_sha256:
        required: true
        type: string
      candidate_manifest_created_at:
        required: true
        type: string
      candidate_manifest_expires_at:
        required: true
        type: string
      expected_source_sha:
        required: true
        type: string
      release_intent_id:
        required: true
        type: string
      planned_release_ref:
        required: true
        type: string
      release_kind:
        required: true
        type: string
      release_policy_sha256:
        required: true
        type: string
      release_policy_contract_blob_oid:
        required: true
        type: string
    outputs:
      policy_audit_reference_artifact_id:
        description: Exact nonpublishing simulation reference artifact ID
        value: ${{ jobs.policy-audit.outputs.reference_artifact_id }}
      policy_audit_reference_artifact_digest:
        description: Exact nonpublishing simulation reference artifact digest
        value: ${{ jobs.policy-audit.outputs.reference_artifact_digest }}

permissions: {}

jobs:
  prepare-policy-audit:
    name: Refuse policy audit until explicit PR8 activation
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      bundle_artifact_id: ${{ steps.bundle.outputs.artifact-id }}
      bundle_artifact_digest: sha256:${{ steps.bundle.outputs.artifact-digest }}
      bundle_artifact_name: rmux-policy-audit-bundle-${{ github.run_id }}
    env:
      RMUX_CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
      RMUX_CANDIDATE_MANIFEST_RUN_ID: ${{ inputs.candidate_manifest_run_id }}
      RMUX_CANDIDATE_MANIFEST_ARTIFACT_ID: ${{ inputs.candidate_manifest_artifact_id }}
      RMUX_CANDIDATE_MANIFEST_ARTIFACT_DIGEST: ${{ inputs.candidate_manifest_artifact_digest }}
      RMUX_CANDIDATE_MANIFEST_SHA256: ${{ inputs.candidate_manifest_sha256 }}
      RMUX_CANDIDATE_MANIFEST_CREATED_AT: ${{ inputs.candidate_manifest_created_at }}
      RMUX_CANDIDATE_MANIFEST_EXPIRES_AT: ${{ inputs.candidate_manifest_expires_at }}
      RMUX_EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
      RMUX_RELEASE_INTENT_ID: ${{ inputs.release_intent_id }}
      RMUX_PLANNED_RELEASE_REF: ${{ inputs.planned_release_ref }}
      RMUX_RELEASE_KIND: ${{ inputs.release_kind }}
      RMUX_RELEASE_POLICY_SHA256: ${{ inputs.release_policy_sha256 }}
      RMUX_RELEASE_POLICY_CONTRACT_BLOB_OID: ${{ inputs.release_policy_contract_blob_oid }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Fail closed before packaging or privileged work
        if: ${{ !inputs.simulation }}
        run: scripts/release/assert-release-capability.py policy_audit

      - name: Validate the disarmed simulation entrypoint
        if: ${{ inputs.simulation }}
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = workflow_dispatch
          test "$GITHUB_WORKFLOW" = "Release promotion simulation"
          test "$GITHUB_REF" = refs/heads/main
          test "$GITHUB_RUN_ATTEMPT" = 1
          python3 - <<'PY'
          import json
          import pathlib

          path = pathlib.Path(".github/release/release-activation.json")
          value = json.loads(path.read_text(encoding="utf-8"))
          capabilities = value.get("capabilities")
          if value.get("status") != "disarmed" or not isinstance(capabilities, dict):
              raise SystemExit("release activation ledger is not disarmed")
          if not capabilities or any(setting is not False for setting in capabilities.values()):
              raise SystemExit("release simulation requires every capability to be false")
          PY

      - name: Validate exact audit inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RMUX_CANDIDATE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RMUX_CANDIDATE_MANIFEST_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RMUX_CANDIDATE_MANIFEST_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RMUX_CANDIDATE_MANIFEST_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$RMUX_CANDIDATE_MANIFEST_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RMUX_EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RMUX_RELEASE_INTENT_ID" =~ ^[A-Za-z0-9._:-]{8,128}$ ]]
          [[ "$RMUX_PLANNED_RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]
          [[ "$RMUX_RELEASE_KIND" =~ ^(rc|stable)$ ]]
          [[ "$RMUX_RELEASE_POLICY_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RMUX_RELEASE_POLICY_CONTRACT_BLOB_OID" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_RUN_ATTEMPT" = 1
          test "$GITHUB_SHA" = "$RMUX_EXPECTED_SOURCE_SHA"

      - name: Verify the exact candidate manifest artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/release/actions-artifact.py verify
          --repository "$GITHUB_REPOSITORY"
          --run-id "$RMUX_CANDIDATE_MANIFEST_RUN_ID"
          --artifact-id "$RMUX_CANDIDATE_MANIFEST_ARTIFACT_ID"
          --name "rmux-candidate-manifest-$RMUX_CANDIDATE_RUN_ID"
          --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA"
          --expected-digest "$RMUX_CANDIDATE_MANIFEST_ARTIFACT_DIGEST"
          --expected-workflow-id 316223904
          --expected-workflow-path .github/workflows/release-shadow.yml
          --expected-event workflow_dispatch
          --expected-head-branch main
          --max-attempts 1

      - name: Download only the exact candidate manifest artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ inputs.candidate_manifest_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/rmux-policy-audit-candidate
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_manifest_run_id }}

      - name: Verify the exact candidate manifest binding
        shell: bash
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/rmux-policy-audit-candidate/candidate-manifest.json" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys

          path = pathlib.Path(sys.argv[1])
          raw = path.read_bytes()
          if hashlib.sha256(raw).hexdigest() != os.environ["RMUX_CANDIDATE_MANIFEST_SHA256"]:
              raise SystemExit("candidate manifest SHA-256 differs")
          value = json.loads(raw)
          expected = {
              "schema_version": 1,
              "repository_id": 1239918790,
              "source_git_sha": os.environ["RMUX_EXPECTED_SOURCE_SHA"],
              "candidate_run_id": int(os.environ["RMUX_CANDIDATE_RUN_ID"]),
              "candidate_run_attempt": 1,
              "release_intent_id": os.environ["RMUX_RELEASE_INTENT_ID"],
              "planned_release_ref": os.environ["RMUX_PLANNED_RELEASE_REF"],
              "release_kind": os.environ["RMUX_RELEASE_KIND"],
              "created_at": os.environ["RMUX_CANDIDATE_MANIFEST_CREATED_AT"],
              "expires_at": os.environ["RMUX_CANDIDATE_MANIFEST_EXPIRES_AT"],
          }
          for field, wanted in expected.items():
              if value.get(field) != wanted:
                  raise SystemExit(f"candidate manifest {field} differs")
          policy = value.get("release_policy", {})
          if policy.get("sha256") != os.environ["RMUX_RELEASE_POLICY_SHA256"]:
              raise SystemExit("candidate manifest policy SHA-256 differs")
          if policy.get("contract_blob_oid") != os.environ["RMUX_RELEASE_POLICY_CONTRACT_BLOB_OID"]:
              raise SystemExit("candidate manifest policy contract blob differs")
          PY

      - name: Recompute and materialize the exact policy root binding
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .rmux-policy-audit
          scripts/release/policy-root.py \
            --source-sha "$RMUX_EXPECTED_SOURCE_SHA" \
            --output .rmux-policy-audit/computed-release-policy-root.json
          python3 - .rmux-policy-audit/computed-release-policy-root.json <<'PY'
          import json
          import os
          import pathlib
          import sys

          computed = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          value = {
              "source_git_sha": os.environ["RMUX_EXPECTED_SOURCE_SHA"],
              "release_policy_sha256": os.environ["RMUX_RELEASE_POLICY_SHA256"],
              "contract_blob_oid": os.environ["RMUX_RELEASE_POLICY_CONTRACT_BLOB_OID"],
          }
          for field, wanted in value.items():
              if computed.get(field) != wanted:
                  raise SystemExit(f"computed release policy {field} differs")
          pathlib.Path(".rmux-policy-audit/release-policy-root.json").write_text(
              json.dumps(value, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - id: bundle
        name: Upload the unprivileged exact policy bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-policy-audit-bundle-${{ github.run_id }}
          path: |
            .github/release/policy-audit-contract.json
            .github/release/release-activation.json
            .github/release/schemas/policy-audit-predicate.schema.json
            .github/release/schemas/policy-audit-reference.schema.json
            .rmux-policy-audit/release-policy-root.json
            scripts/release/actions-artifact.py
            scripts/release/github_actions.py
            scripts/release/policy-audit.py
            scripts/release/policy_audit_contract.py
            scripts/release/policy_audit_live_state.py
            scripts/release/policy_audit_model.py
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  policy-audit:
    name: Nonpublishing live policy audit simulation
    needs: prepare-policy-audit
    if: ${{ inputs.simulation }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    environment: release-policy-audit
    permissions:
      actions: read
    outputs:
      reference_artifact_id: ${{ steps.reference-api.outputs.artifact_id }}
      reference_artifact_digest: ${{ steps.reference-api.outputs.artifact_digest }}
    env:
      RMUX_CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
      RMUX_CANDIDATE_MANIFEST_RUN_ID: ${{ inputs.candidate_manifest_run_id }}
      RMUX_CANDIDATE_MANIFEST_ARTIFACT_ID: ${{ inputs.candidate_manifest_artifact_id }}
      RMUX_CANDIDATE_MANIFEST_ARTIFACT_DIGEST: ${{ inputs.candidate_manifest_artifact_digest }}
      RMUX_CANDIDATE_MANIFEST_SHA256: ${{ inputs.candidate_manifest_sha256 }}
      RMUX_CANDIDATE_MANIFEST_CREATED_AT: ${{ inputs.candidate_manifest_created_at }}
      RMUX_CANDIDATE_MANIFEST_EXPIRES_AT: ${{ inputs.candidate_manifest_expires_at }}
      RMUX_EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
      RMUX_RELEASE_INTENT_ID: ${{ inputs.release_intent_id }}
      RMUX_PLANNED_RELEASE_REF: ${{ inputs.planned_release_ref }}
      RMUX_RELEASE_KIND: ${{ inputs.release_kind }}
    steps:
      - name: Download only the prepared policy bundle ID
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          artifact-ids: ${{ needs.prepare-policy-audit.outputs.bundle_artifact_id }}
          merge-multiple: true
          path: ${{ runner.temp }}/rmux-policy-audit
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}

      - name: Verify the policy bundle API digest
        working-directory: ${{ runner.temp }}/rmux-policy-audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/release/actions-artifact.py verify
          --repository "$GITHUB_REPOSITORY"
          --run-id "$GITHUB_RUN_ID"
          --artifact-id "${{ needs.prepare-policy-audit.outputs.bundle_artifact_id }}"
          --name "${{ needs.prepare-policy-audit.outputs.bundle_artifact_name }}"
          --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA"
          --expected-digest "${{ needs.prepare-policy-audit.outputs.bundle_artifact_digest }}"
          --max-attempts 1

      # The pinned Action alone may POST one installation token and DELETE that
      # same token during its post step. The RMUX collector below remains GET-only.
      - id: audit-app
        name: Create the repository-scoped audit App token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ vars.RMUX_POLICY_AUDIT_APP_ID }}
          private-key: ${{ secrets.RMUX_POLICY_AUDIT_APP_PRIVATE_KEY }}
          owner: Helvesec
          repositories: rmux
          permission-actions: read
          permission-administration: write
          permission-metadata: read

      - name: Collect the exact live GET-only policy state
        working-directory: ${{ runner.temp }}/rmux-policy-audit
        env:
          RMUX_POLICY_AUDIT_TOKEN: ${{ steps.audit-app.outputs.token }}
        run: >-
          python3 scripts/release/policy-audit.py collect
          --repository "$GITHUB_REPOSITORY"
          --source-sha "$RMUX_EXPECTED_SOURCE_SHA"
          --candidate-run-id "$RMUX_CANDIDATE_RUN_ID"
          --candidate-run-attempt 1
          --candidate-manifest-run-id "$RMUX_CANDIDATE_MANIFEST_RUN_ID"
          --candidate-manifest-run-attempt 1
          --candidate-manifest-artifact-id "$RMUX_CANDIDATE_MANIFEST_ARTIFACT_ID"
          --candidate-manifest-artifact-digest "$RMUX_CANDIDATE_MANIFEST_ARTIFACT_DIGEST"
          --candidate-manifest-sha256 "$RMUX_CANDIDATE_MANIFEST_SHA256"
          --candidate-manifest-created-at "$RMUX_CANDIDATE_MANIFEST_CREATED_AT"
          --candidate-manifest-expires-at "$RMUX_CANDIDATE_MANIFEST_EXPIRES_AT"
          --release-intent-id "$RMUX_RELEASE_INTENT_ID"
          --planned-release-ref "$RMUX_PLANNED_RELEASE_REF"
          --release-kind "$RMUX_RELEASE_KIND"
          --audit-run-id "$GITHUB_RUN_ID"
          --audit-run-attempt "$GITHUB_RUN_ATTEMPT"
          --audit-app-id "${{ vars.RMUX_POLICY_AUDIT_APP_ID }}"
          --audit-installation-id "${{ steps.audit-app.outputs.installation-id }}"
          --audit-app-slug "${{ steps.audit-app.outputs.app-slug }}"
          --contract .github/release/policy-audit-contract.json
          --policy-root .rmux-policy-audit/release-policy-root.json
          --output policy-audit-predicate.json

      - name: Verify the predicate before upload
        working-directory: ${{ runner.temp }}/rmux-policy-audit
        run: >-
          python3 scripts/release/policy-audit.py verify
          --predicate policy-audit-predicate.json
          --contract .github/release/policy-audit-contract.json

      - id: predicate-upload
        name: Upload only the short-lived policy predicate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-policy-audit-predicate-${{ github.run_id }}
          path: ${{ runner.temp }}/rmux-policy-audit/policy-audit-predicate.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - id: predicate-api
        name: Resolve the predicate by exact API artifact ID
        working-directory: ${{ runner.temp }}/rmux-policy-audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/release/actions-artifact.py resolve-id
          --repository "$GITHUB_REPOSITORY"
          --run-id "$GITHUB_RUN_ID"
          --artifact-id "${{ steps.predicate-upload.outputs.artifact-id }}"
          --name "rmux-policy-audit-predicate-$GITHUB_RUN_ID"
          --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA"
          --max-attempts 6
          --retry-delay-seconds 2
          --github-output "$GITHUB_OUTPUT"

      - name: Create the non-circular post-upload reference
        working-directory: ${{ runner.temp }}/rmux-policy-audit
        run: >-
          python3 scripts/release/policy-audit.py reference
          --predicate policy-audit-predicate.json
          --predicate-artifact-id "${{ steps.predicate-api.outputs.artifact_id }}"
          --predicate-artifact-digest "${{ steps.predicate-api.outputs.artifact_digest }}"
          --output policy-audit-reference.json

      - name: Verify the predicate/reference binding
        working-directory: ${{ runner.temp }}/rmux-policy-audit
        run: >-
          python3 scripts/release/policy-audit.py verify-reference
          --predicate policy-audit-predicate.json
          --reference policy-audit-reference.json
          --contract .github/release/policy-audit-contract.json

      - id: reference-upload
        name: Upload the post-upload reference separately
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-policy-audit-reference-${{ github.run_id }}
          path: ${{ runner.temp }}/rmux-policy-audit/policy-audit-reference.json
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - id: reference-api
        name: Resolve the reference by exact API artifact ID
        working-directory: ${{ runner.temp }}/rmux-policy-audit
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/release/actions-artifact.py resolve-id
          --repository "$GITHUB_REPOSITORY"
          --run-id "$GITHUB_RUN_ID"
          --artifact-id "${{ steps.reference-upload.outputs.artifact-id }}"
          --name "rmux-policy-audit-reference-$GITHUB_RUN_ID"
          --expected-source-sha "$RMUX_EXPECTED_SOURCE_SHA"
          --max-attempts 6
          --retry-delay-seconds 2
          --github-output "$GITHUB_OUTPUT"
