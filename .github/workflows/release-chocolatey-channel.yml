name: Publish exact Chocolatey channel

on:
  workflow_call:
    inputs:
      receipt_run_id: {required: true, type: string}
      plan_artifact_id: {required: true, type: string}
      plan_artifact_digest: {required: true, type: string}
      payload_artifact_id: {required: true, type: string}
      payload_artifact_digest: {required: true, type: string}
      expected_source_sha: {required: true, type: string}
      release_id: {required: true, type: string}
      release_ref: {required: true, type: string}

permissions: {}

jobs:
  publish:
    name: Submit exact Chocolatey package
    runs-on: windows-latest
    timeout-minutes: 30
    environment: release
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    concurrency:
      group: rmux-channel-chocolatey-${{ inputs.release_ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.expected_source_sha }}
          persist-credentials: false

      - id: prepare
        uses: ./.github/actions/release-channel-prepare
        with:
          channel: chocolatey
          receipt-run-id: ${{ inputs.receipt_run_id }}
          plan-artifact-id: ${{ inputs.plan_artifact_id }}
          plan-artifact-digest: ${{ inputs.plan_artifact_digest }}
          payload-artifact-id: ${{ inputs.payload_artifact_id }}
          payload-artifact-digest: ${{ inputs.payload_artifact_digest }}
          source-sha: ${{ inputs.expected_source_sha }}
          release-id: ${{ inputs.release_id }}
          release-ref: ${{ inputs.release_ref }}

      - id: decision
        name: Resolve exact Chocolatey execution authority
        shell: pwsh
        run: >-
          python scripts/release/channel-execution.py
          --request "${{ steps.prepare.outputs.request }}" --channel chocolatey
          --target-evidence "${{ steps.prepare.outputs.root }}/downstream-channel-target-evidence.json"
          --github-output "$env:GITHUB_OUTPUT"

      - id: writer
        name: Submit exact Chocolatey package or verify public bytes
        if: steps.decision.outputs.execute == 'true'
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: >-
          scripts/release/publish-chocolatey-package.ps1
          -PayloadDir "${{ steps.prepare.outputs.payload-root }}"
          -ReleaseRef "${{ inputs.release_ref }}"
          -TargetEvidence "${{ steps.prepare.outputs.root }}/downstream-channel-target-evidence.json"
          -GitHubOutput "$env:GITHUB_OUTPUT"

      - id: outcome
        name: Normalize executable and policy-only outcomes
        shell: pwsh
        env:
          RMUX_EXECUTE: ${{ steps.decision.outputs.execute }}
          RMUX_EXECUTED_STATE: ${{ steps.writer.outputs.state }}
          RMUX_BLOCKED_STATE: ${{ steps.decision.outputs.state }}
          RMUX_EXECUTED_MUTATION: ${{ steps.writer.outputs.mutation_started }}
          RMUX_BLOCKED_MUTATION: ${{ steps.decision.outputs.mutation_started }}
          RMUX_EXECUTED_REMOTE_ID: ${{ steps.writer.outputs.remote_request_id }}
          RMUX_BLOCKED_REMOTE_ID: ${{ steps.decision.outputs.remote_request_id }}
        run: |
          $execute = $env:RMUX_EXECUTE -eq "true"
          $state = if ($execute) { $env:RMUX_EXECUTED_STATE } else { $env:RMUX_BLOCKED_STATE }
          $mutation = if ($execute) { $env:RMUX_EXECUTED_MUTATION } else { $env:RMUX_BLOCKED_MUTATION }
          $remoteId = if ($execute) { $env:RMUX_EXECUTED_REMOTE_ID } else { $env:RMUX_BLOCKED_REMOTE_ID }
          if ([string]::IsNullOrWhiteSpace($state) -or $mutation -notmatch '^(true|false)$') {
              throw "Chocolatey outcome is incomplete"
          }
          "state=$state" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "mutation_started=$mutation" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "remote_request_id=$remoteId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Seal exact Chocolatey result evidence
        uses: ./.github/actions/release-channel-result
        with:
          channel: chocolatey
          prepared-root: ${{ steps.prepare.outputs.root }}
          state: ${{ steps.outcome.outputs.state }}
          started-at: ${{ steps.decision.outputs.started_at }}
          mutation-started: ${{ steps.outcome.outputs.mutation_started }}
          remote-request-id: ${{ steps.outcome.outputs.remote_request_id }}
          target-evidence: ${{ steps.prepare.outputs.root }}/downstream-channel-target-evidence.json
          source-sha: ${{ inputs.expected_source_sha }}
          release-id: ${{ inputs.release_id }}
          release-ref: ${{ inputs.release_ref }}
          producer-workflow-path: .github/workflows/release-chocolatey-channel.yml
          runner-image: windows-latest
