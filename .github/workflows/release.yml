name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag to release, for example v1.2.3
        required: true
        type: string
      skip_external_package_publish:
        description: Skip Chocolatey and Snap Store publishing for an already-submitted release
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: rmux-release
  cancel-in-progress: false

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_TERM_COLOR: always

jobs:
  source-gates:
    name: Release source gates
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      package_version: ${{ steps.release_identity.outputs.package_version }}
      release_version: ${{ steps.release_identity.outputs.release_version }}
      is_prerelease: ${{ steps.release_identity.outputs.is_prerelease }}
      source_git_sha: ${{ steps.release_identity.outputs.source_git_sha }}
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      RUSTDOCFLAGS: -D warnings
      RUST_MIN_STACK: "8388608"
      RUST_TEST_THREADS: "1"
    steps:
      - name: Validate release event ref
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "Release workflow must run from the tag ref so Sigstore identity matches the release tag" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "$RELEASE_REF" ]]; then
            echo "Release workflow ref ($GITHUB_REF_NAME) must match release ref ($RELEASE_REF)" >&2
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Resolve release identity
        id: release_identity
        shell: bash
        run: |
          set -euo pipefail
          while IFS='=' read -r key value; do
            case "$key" in
              RELEASE_REF|RELEASE_VERSION|PACKAGE_VERSION|IS_PRERELEASE|SOURCE_GIT_SHA)
                echo "$key=$value" >> "$GITHUB_ENV"
                echo "${key,,}=$value" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Unexpected release identity field: $key" >&2
                exit 1
                ;;
            esac
          done < <(scripts/release-identity.sh "$RELEASE_REF")
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.96.1"
          components: clippy, rustfmt

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked --no-fail-fast -- --test-threads=1

      - name: rustdoc with warnings denied
        run: cargo doc --workspace --locked --no-deps

      - name: Unsafe policy gate
        shell: bash
        run: scripts/unsafe-check.sh

      - name: Source boundary gates
        shell: bash
        run: |
          scripts/no-network-in-runtime.sh
          scripts/check-platform-neutrality.sh
          scripts/no-debug-assert-side-effects.sh

      - name: Install tmux oracle build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison build-essential ca-certificates curl libevent-dev libncurses-dev libutf8proc-dev pkg-config

      - name: Cache tmux oracle source
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/rmux-oracle
          key: tmux-oracle-3.7b-87f2e99e3b685973f2ca002ffd6ed7e51a5744f7009daae5a15670b6d532db96

      - name: Build pinned tmux 3.7b oracle
        shell: bash
        run: scripts/oracle/build-tmux37.sh --prefix "$RUNNER_TEMP/rmux-oracle"

      - name: Release review gate
        shell: bash
        env:
          RMUX_FROZEN_TMUX: ${{ runner.temp }}/rmux-oracle/tmux
          RMUX_REQUIRE_TMUX: "1"
          RMUX_PERF_AUTO_CURRENT: "1"
          RMUX_PERF_GATE_MODE: portable-budget
          RMUX_PERF_EXPECTED_GIT_SHA: ${{ github.sha }}
          RMUX_PERF_EXPECTED_PLATFORM: linux
          RMUX_PERF_EXPECTED_PROVENANCE: github-actions:${{ github.repository }}:${{ github.workflow }}:${{ github.job }}:${{ github.run_id }}:${{ github.run_attempt }}
          RMUX_PERF_MAX_CURRENT_AGE_SECONDS: "21600"
        run: scripts/release-review-gate.sh --target-dir target/release-review

  build:
    name: Build ${{ matrix.target }}
    needs:
      - source-gates
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform-label: linux-x86_64
            binary: rmux
            archive: tar.gz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            platform-label: linux-aarch64
            binary: rmux
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform-label: macos-x86_64
            binary: rmux
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            platform-label: macos-aarch64
            binary: rmux
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform-label: windows-x86_64
            binary: rmux.exe
            archive: zip
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
      TARGET: ${{ matrix.target }}
      PLATFORM_LABEL: ${{ matrix.platform-label }}
      BINARY: ${{ matrix.binary }}
      BUILD_PROFILE: release
      PROFILE_DIR: release
      CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS: "-C target-feature=+crt-static"
    steps:
      - name: Validate release ref
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "Release workflow must run from the tag ref so Sigstore identity matches the release tag" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "$RELEASE_REF" ]]; then
            echo "Release workflow ref ($GITHUB_REF_NAME) must match release ref ($RELEASE_REF)" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release ref: $RELEASE_REF" >&2
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_GIT_SHA"

      - name: Resolve release identity
        shell: bash
        run: |
          set -euo pipefail
          scripts/release-identity.sh "$RELEASE_REF" | tee release-identity.env
          cat release-identity.env >> "$GITHUB_ENV"
          test "$(sed -n 's/^SOURCE_GIT_SHA=//p' release-identity.env)" = "$GITHUB_SHA"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.96.1"
          components: clippy
          targets: ${{ matrix.target }}

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Windows MSVC clippy
        if: runner.os == 'Windows'
        shell: pwsh
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build rmux
        shell: bash
        run: cargo build --package rmux --locked --profile "$BUILD_PROFILE" --target "$TARGET"

      - name: Install Linux package tooling
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils cpio rpm createrepo-c

      - name: Inspect release binary
        shell: bash
        run: |
          bin="target/$TARGET/$PROFILE_DIR/$BINARY"
          test -x "$bin"
          ls -lh "$bin"
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            file "$bin"
          fi
          if [[ "$TARGET" == *-unknown-linux-gnu ]]; then
            glibc_floor="$(scripts/glibc-symbol-floor.sh "$bin")"
            echo "max GLIBC symbol: GLIBC_$glibc_floor"
            if [[ "$(printf '%s\n' "$glibc_floor" "2.35" | sort -V | tail -n 1)" != "2.35" ]]; then
              echo "Linux release binary requires GLIBC_$glibc_floor; expected GLIBC_2.35 or older" >&2
              exit 1
            fi
          fi

      - name: Re-sign macOS binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bin="target/$TARGET/$PROFILE_DIR/$BINARY"
          codesign --force --sign - "$bin"
          codesign --verify --verbose=2 "$bin"

      - name: Smoke binary
        shell: bash
        run: |
          bin="target/$TARGET/$PROFILE_DIR/$BINARY"
          "$bin" -V | tee version.txt
          grep -Fx "rmux $PACKAGE_VERSION" version.txt

      - name: Windows runtime smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bin = "target/$env:TARGET/$env:PROFILE_DIR/$env:BINARY"
          & $bin -V
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $bin list-commands | Out-Null
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Windows attach and daemon regression tests
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RMUX_EXPECTED_GIT_SHA: ${{ github.sha }}
        run: |
          $ErrorActionPreference = "Stop"
          $env:CARGO_INCREMENTAL = "0"
          $env:CARGO_BUILD_JOBS = "1"
          $env:CARGO_PROFILE_DEV_DEBUG = "0"
          $env:CARGO_PROFILE_DEV_BUILD_OVERRIDE_DEBUG = "0"
          $env:CARGO_PROFILE_TEST_DEBUG = "0"
          $env:RUSTFLAGS = "-C target-feature=+crt-static -Clink-arg=/DEBUG:NONE"
          # GitHub Actions pwsh only checks the LAST native exit code, so a
          # failing intermediate assert or cargo test would be masked by any
          # later success; fail closed after every native command instead,
          # using array splatting like the local Windows gate so bare "--"
          # separators reach cargo instead of the parameter binder.
          function Run([string]$Program, [string[]]$Arguments) {
            & $Program @Arguments
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux-client", "--locked", "output_writer_failure_wakes")
          Run "cargo" @("test", "-p", "rmux-client", "--locked", "output_writer_failure_wakes", "--", "--test-threads=1")
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux-client", "--locked", "blocked_console_output_does_not_block_input_forwarding")
          Run "cargo" @("test", "-p", "rmux-client", "--locked", "blocked_console_output_does_not_block_input_forwarding", "--", "--test-threads=1")
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux-client", "--locked", "output_backpressure_keeps_local_input_and_resize_live")
          Run "cargo" @("test", "-p", "rmux-client", "--locked", "output_backpressure_keeps_local_input_and_resize_live", "--", "--test-threads=1")
          & "./scripts/windows_ctrl_matrix.ps1" -StaticMatrixSpec
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $releaseBin = "target/$env:TARGET/$env:PROFILE_DIR/$env:BINARY"
          $packageHelper = "target/$env:TARGET/$env:PROFILE_DIR/rmux-full.exe"
          $runtimeHelper = "target/$env:TARGET/$env:PROFILE_DIR/libexec/rmux/rmux.exe"
          $releaseDaemon = "target/$env:TARGET/$env:PROFILE_DIR/rmux-daemon.exe"
          Copy-Item -LiteralPath $releaseBin -Destination $packageHelper -Force
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $runtimeHelper) | Out-Null
          Copy-Item -LiteralPath $releaseBin -Destination $runtimeHelper -Force
          $testRustFlags = $env:RUSTFLAGS
          try {
            Remove-Item Env:\RUSTFLAGS -ErrorAction SilentlyContinue
            Run "cargo" @(
              "build", "--package", "rmux", "--locked",
              "--profile", $env:BUILD_PROFILE,
              "--target", $env:TARGET,
              "--bin", "rmux-daemon"
            )
            Run "cargo" @(
              "build", "--package", "rmux", "--locked",
              "--profile", $env:BUILD_PROFILE,
              "--target", $env:TARGET,
              "--features", "tiny-cli",
              "--bin", "rmux"
            )
          } finally {
            $env:RUSTFLAGS = $testRustFlags
          }
          Run "./scripts/assert-windows-static-crt.ps1" @(
            "-Binary", $releaseBin,
            "-HelperBinary", $packageHelper,
            "-DaemonBinary", $releaseDaemon
          )
          $actualGitSha = (& git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $actualGitSha -ne $env:RMUX_EXPECTED_GIT_SHA) {
            throw "release binary manifest Git SHA does not match the checked-out release"
          }
          $releaseManifestPath = "target/windows-release-evidence/release-binaries.json"
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $releaseManifestPath) | Out-Null
          $releaseManifest = [ordered]@{
            schema = 1
            kind = "rmux-windows-release-binaries"
            git_commit = $actualGitSha
            target = $env:TARGET
            configuration = $env:BUILD_PROFILE
            binary_sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $releaseBin).Hash.ToLowerInvariant()
            helper_binary_sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $packageHelper).Hash.ToLowerInvariant()
            daemon_binary_sha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $releaseDaemon).Hash.ToLowerInvariant()
          }
          [System.IO.File]::WriteAllText(
            $releaseManifestPath,
            ($releaseManifest | ConvertTo-Json -Depth 3),
            [System.Text.UTF8Encoding]::new($false)
          )
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux", "--locked", "--test", "windows_ctrl_matrix_spec")
          Run "cargo" @("test", "-p", "rmux", "--locked", "--test", "windows_ctrl_matrix_spec", "--", "--test-threads=1")
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux", "--locked", "--test", "windows_cli_queue_formats")
          Run "cargo" @("test", "-p", "rmux", "--locked", "--test", "windows_cli_queue_formats", "--", "--test-threads=1")
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux", "--locked", "--test", "windows_attach_exit")
          Run "cargo" @("test", "-p", "rmux", "--locked", "--test", "windows_attach_exit", "--", "--test-threads=1")
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux", "--locked", "--test", "automation_cli_windows")
          Run "cargo" @("test", "-p", "rmux", "--locked", "--test", "automation_cli_windows", "--", "--test-threads=1")
          Run "./scripts/assert-cargo-filter-nonempty.ps1" @("1", "--", "test", "-p", "rmux", "--locked", "--test", "internal_daemon_windows")
          Run "cargo" @("test", "-p", "rmux", "--locked", "--test", "internal_daemon_windows", "--", "--nocapture", "--test-threads=1")

      - name: Upload Windows release evidence
        if: runner.os == 'Windows' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-${{ env.RELEASE_REF }}-${{ matrix.target }}-windows-release-evidence
          path: target/windows-release-evidence
          if-no-files-found: error

      - name: Create Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          rm -rf dist
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            export RMUX_PACKAGE_CODESIGN_ADHOC=1
          fi
          scripts/package-unix.sh \
            --configuration "$BUILD_PROFILE" \
            --target "$TARGET" \
            --output-dir dist
          archive="$(ls dist/rmux-*.tar.gz | head -n 1)"
          scripts/verify-package.sh "$archive" --checksums dist/SHA256SUMS.txt --run-binary --require-release-artifact

      - name: Create Linux distro packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          scripts/package-debian.sh \
            --configuration "$BUILD_PROFILE" \
            --target "$TARGET" \
            --output-dir dist \
            --skip-build \
            --reuse-release-binary
          deb="$(ls dist/rmux_*.deb | head -n 1)"
          scripts/verify-debian-package.sh "$deb" --checksums dist/SHA256SUMS.txt --run-binary --require-release-artifact

          scripts/package-rpm.sh \
            --configuration "$BUILD_PROFILE" \
            --target "$TARGET" \
            --output-dir dist \
            --skip-build \
            --reuse-release-binary
          rpm="$(ls dist/rmux-*.rpm | head -n 1)"
          scripts/verify-rpm-package.sh "$rpm" --checksums dist/SHA256SUMS.txt --run-binary --require-release-artifact

      - name: Create Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          ./scripts/package-windows.ps1 `
            -Configuration "$env:BUILD_PROFILE" `
            -Target "$env:TARGET" `
            -OutputDir dist `
            -PlatformLabel "$env:PLATFORM_LABEL" `
            -ReuseReleaseBinaries `
            -ReleaseBinaryManifest "target/windows-release-evidence/release-binaries.json"
          $archive = Get-ChildItem -Path dist -Filter "rmux-*.zip" | Select-Object -First 1
          if ($null -eq $archive) {
            throw "Windows package archive was not generated"
          }
          ./scripts/verify-package-windows.ps1 `
            $archive.FullName `
            -Checksums dist/SHA256SUMS.txt `
            -RunBinary `
            -RunDaemonSmoke `
            -RunSdkSmoke `
            -RunMouseBorderSmoke `
            -RequireReleaseArtifact

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-${{ env.RELEASE_REF }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  platform-gates:
    name: Native release gate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    needs:
      - source-gates
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15-intel
          - macos-15
          - windows-latest
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_GIT_SHA"

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.96.1"
          components: rustfmt

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Windows native release review gate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RMUX_ALLOW_INTERNAL_DAEMON_IN_CALLER_JOB: "1"
        run: ./scripts/release-review-gate-windows.ps1 -SkipPackage -SkipClippy

      - name: macOS native runtime smoke
        if: runner.os == 'macOS'
        shell: bash
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/rmux-macos-smoke-target
          RMUX_SMOKE_DIR: ${{ runner.temp }}/rmux-macos-smoke-reports
        run: scripts/smoke-macos.sh

      - name: Upload macOS native smoke report
        if: runner.os == 'macOS' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-${{ env.RELEASE_REF }}-${{ matrix.os }}-macos-smoke
          path: ${{ runner.temp }}/rmux-macos-smoke-reports
          if-no-files-found: error

  snap:
    name: Build Snap ${{ matrix.snap-arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    needs:
      - source-gates
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            snap-arch: amd64
          - os: ubuntu-22.04-arm
            snap-arch: arm64
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
    steps:
      - name: Validate release ref
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            echo "Release workflow must run from the tag ref so Sigstore identity matches the release tag" >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "$RELEASE_REF" ]]; then
            echo "Release workflow ref ($GITHUB_REF_NAME) must match release ref ($RELEASE_REF)" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release ref: $RELEASE_REF" >&2
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_GIT_SHA"

      - name: Build snap
        id: snapcraft
        uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79
        with:
          path: .

      - name: Smoke snap package
        run: scripts/smoke-snap-package.sh "${{ steps.snapcraft.outputs.snap }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmux-${{ env.RELEASE_REF }}-snap-${{ matrix.snap-arch }}
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  validate-external-configuration:
    name: Validate external rollout configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: release
    needs:
      - source-gates
    env:
      IS_PRERELEASE: ${{ needs.source-gates.outputs.is_prerelease }}
    steps:
      - name: Require configured external publishers
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
        shell: bash
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          RMUX_PACKAGE_REPO_TOKEN: ${{ secrets.RMUX_PACKAGE_REPO_TOKEN }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          missing=0
          if [ -z "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            echo "Missing required secret: SNAPCRAFT_STORE_CREDENTIALS" >&2
            missing=1
          fi
          if [ "$IS_PRERELEASE" != "true" ]; then
            for name in RMUX_PACKAGE_REPO_TOKEN CHOCOLATEY_API_KEY; do
              if [ -z "${!name:-}" ]; then
                echo "Missing required secret: $name" >&2
                missing=1
              fi
            done
          fi
          [ "$missing" -eq 0 ]

  prepare-release:
    name: Prepare signed release draft
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    needs:
      - source-gates
      - build
      - platform-gates
      - snap
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      PACKAGE_VERSION: ${{ needs.source-gates.outputs.package_version }}
      RELEASE_VERSION: ${{ needs.source-gates.outputs.release_version }}
      IS_PRERELEASE: ${{ needs.source-gates.outputs.is_prerelease }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
      RMUX_PACKAGE_REPO: Helvesec/rmux-packages
      RMUX_PACKAGE_REPO_BRANCH: main
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_GIT_SHA"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
        shell: bash
        run: |
          cd release-assets
          shopt -s nullglob
          assets=( *.tar.gz *.zip *.deb *.rpm *.snap )
          if (( ${#assets[@]} == 0 )); then
            echo "No release archives found" >&2
            exit 1
          fi
          printf '%s\0' "${assets[@]}" | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Download existing release checksums
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish }}
        shell: bash
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          gh release download "$RELEASE_REF" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern SHA256SUMS \
            --dir release-assets \
            --clobber
          test -s release-assets/SHA256SUMS

      - name: Install cosign
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v3.1.1

      - name: Sign checksums with Sigstore
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
        shell: bash
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob \
            --yes \
            --bundle release-assets/SHA256SUMS.sigstore.json \
            release-assets/SHA256SUMS

      - name: Generate build provenance attestations
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.snap
            release-assets/SHA256SUMS
            release-assets/SHA256SUMS.sigstore.json

      - name: Install repository metadata tooling
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) && needs.source-gates.outputs.is_prerelease != 'true' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c gnupg rpm

      - name: Import Linux repository signing keys
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) && needs.source-gates.outputs.is_prerelease != 'true' }}
        shell: bash
        env:
          RMUX_APT_GPG_PRIVATE_KEY: ${{ secrets.RMUX_APT_GPG_PRIVATE_KEY }}
          RMUX_APT_GPG_KEY: ${{ secrets.RMUX_APT_GPG_KEY }}
          RMUX_RPM_GPG_PRIVATE_KEY: ${{ secrets.RMUX_RPM_GPG_PRIVATE_KEY }}
          RMUX_RPM_GPG_KEY: ${{ secrets.RMUX_RPM_GPG_KEY }}
          RMUX_RPM_REPO_GPG_PRIVATE_KEY: ${{ secrets.RMUX_RPM_REPO_GPG_PRIVATE_KEY }}
          RMUX_RPM_REPO_GPG_KEY: ${{ secrets.RMUX_RPM_REPO_GPG_KEY }}
        run: |
          missing=0
          for name in RMUX_APT_GPG_PRIVATE_KEY RMUX_APT_GPG_KEY RMUX_RPM_GPG_PRIVATE_KEY RMUX_RPM_GPG_KEY RMUX_RPM_REPO_GPG_PRIVATE_KEY RMUX_RPM_REPO_GPG_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

          install -m 700 -d ~/.gnupg
          printf '%s\n' "$RMUX_APT_GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s\n' "$RMUX_RPM_GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s\n' "$RMUX_RPM_REPO_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --list-secret-keys "$RMUX_APT_GPG_KEY" >/dev/null
          gpg --batch --list-secret-keys "$RMUX_RPM_GPG_KEY" >/dev/null
          gpg --batch --list-secret-keys "$RMUX_RPM_REPO_GPG_KEY" >/dev/null
          rpm_fingerprint="$(gpg --batch --with-colons --fingerprint "$RMUX_RPM_GPG_KEY" | awk -F: '$1 == "fpr" { print $10; exit }')"
          repo_fingerprint="$(gpg --batch --with-colons --fingerprint "$RMUX_RPM_REPO_GPG_KEY" | awk -F: '$1 == "fpr" { print $10; exit }')"
          [ -n "$rpm_fingerprint" ] || { echo "Unable to resolve RMUX_RPM_GPG_KEY fingerprint" >&2; exit 1; }
          [ -n "$repo_fingerprint" ] || { echo "Unable to resolve RMUX_RPM_REPO_GPG_KEY fingerprint" >&2; exit 1; }
          [ "$rpm_fingerprint" != "$repo_fingerprint" ] || { echo "RPM package and repository signing keys must be distinct" >&2; exit 1; }

      - name: Generate Homebrew formula
        shell: bash
        run: |
          mkdir -p target/homebrew/Formula
          scripts/generate-homebrew-formula.sh \
            --version "$PACKAGE_VERSION" \
            --release-tag "$RELEASE_REF" \
            --checksums release-assets/SHA256SUMS \
            --output target/homebrew/Formula/rmux.rb
          if command -v ruby >/dev/null 2>&1; then
            ruby -c target/homebrew/Formula/rmux.rb
          fi

      - name: Generate package manager metadata
        shell: bash
        run: |
          mkdir -p \
            target/package-managers/homebrew/Formula \
            target/package-managers/winget \
            target/package-managers/scoop \
            target/package-managers/chocolatey
          cp target/homebrew/Formula/rmux.rb target/package-managers/homebrew/Formula/rmux.rb
          scripts/generate-winget-manifest.sh \
            --version "$PACKAGE_VERSION" \
            --release-tag "$RELEASE_REF" \
            --checksums release-assets/SHA256SUMS \
            --output target/package-managers/winget/Helvesec.RMUX.yaml
          scripts/generate-scoop-manifest.sh \
            --version "$PACKAGE_VERSION" \
            --release-tag "$RELEASE_REF" \
            --checksums release-assets/SHA256SUMS \
            --output target/package-managers/scoop/rmux.json
          scripts/generate-chocolatey-package.sh \
            --version "$PACKAGE_VERSION" \
            --release-tag "$RELEASE_REF" \
            --checksums release-assets/SHA256SUMS \
            --output-dir target/package-managers/chocolatey/rmux
          if command -v ruby >/dev/null 2>&1; then
            ruby -rjson -e '
              manifest = JSON.parse(File.read(ARGV.fetch(0)))
              abort "missing Scoop vcredist2022 dependency" unless manifest["depends"] == "vcredist2022"
              bin = manifest["bin"].is_a?(Array) ? manifest["bin"] : [manifest["bin"]]
              missing = ["rmux.exe", "rmux-daemon.exe"] - bin
              abort "missing Scoop bin entries: #{missing.join(", ")}" unless missing.empty?
            ' target/package-managers/scoop/rmux.json
          fi
          grep -F '<dependency id="vcredist140" />' target/package-managers/chocolatey/rmux/rmux.nuspec

      - name: Validate WinGet metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ./scripts/validate-winget-manifest.ps1 `
            -Manifest "target/package-managers/winget/Helvesec.RMUX.yaml" `
            -Version $env:PACKAGE_VERSION `
            -ReleaseTag $env:RELEASE_REF `
            -Checksums "release-assets/SHA256SUMS" `
            -Repository $env:GITHUB_REPOSITORY

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: package-manager-metadata-${{ env.RELEASE_REF }}
          path: target/package-managers
          if-no-files-found: error

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-validation-assets-${{ env.RELEASE_REF }}
          path: release-assets/SHA256SUMS
          if-no-files-found: error

      - name: Authenticate retained Linux package history
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) && needs.source-gates.outputs.is_prerelease != 'true' }}
        shell: bash
        env:
          RMUX_APT_GPG_KEY: ${{ secrets.RMUX_APT_GPG_KEY }}
          RMUX_RPM_GPG_KEY: ${{ secrets.RMUX_RPM_GPG_KEY }}
        run: |
          : "${RMUX_APT_GPG_KEY:?missing RMUX_APT_GPG_KEY}"
          : "${RMUX_RPM_GPG_KEY:?missing RMUX_RPM_GPG_KEY}"
          : "${RMUX_PACKAGE_REPO:?missing RMUX_PACKAGE_REPO}"
          : "${RMUX_PACKAGE_REPO_BRANCH:?missing RMUX_PACKAGE_REPO_BRANCH}"
          (
            cd release-assets
            sha256sum --check --strict SHA256SUMS
          )
          rm -rf target/package-repository-inputs
          mkdir -p target/package-repository-inputs
          shopt -s nullglob
          current_packages=(release-assets/*.deb release-assets/*.rpm)
          if (( ${#current_packages[@]} == 0 )); then
            echo "No current Linux packages found in release assets" >&2
            exit 1
          fi
          cp -- "${current_packages[@]}" target/package-repository-inputs/
          rm -rf target/package-repository-history
          git clone --depth 1 --branch "$RMUX_PACKAGE_REPO_BRANCH" \
            "https://github.com/${RMUX_PACKAGE_REPO}.git" \
            target/package-repository-history
          git -C target/package-repository-history rev-parse --verify 'HEAD^{commit}' \
            > target/PACKAGE_REPOSITORY_BASE
          scripts/retain-linux-package-history.py \
            --repository-dir target/package-repository-history \
            --staging-dir target/package-repository-inputs \
            --apt-signing-key "$RMUX_APT_GPG_KEY" \
            --rpm-signing-key "$RMUX_RPM_GPG_KEY" \
            --current-version "$PACKAGE_VERSION" \
            --apt-architecture amd64 \
            --apt-architecture arm64 \
            --rpm-architecture x86_64 \
            --rpm-architecture aarch64

      - name: Generate Linux package repositories
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) && needs.source-gates.outputs.is_prerelease != 'true' }}
        shell: bash
        env:
          RMUX_APT_GPG_KEY: ${{ secrets.RMUX_APT_GPG_KEY }}
          RMUX_RPM_GPG_KEY: ${{ secrets.RMUX_RPM_GPG_KEY }}
          RMUX_RPM_REPO_GPG_KEY: ${{ secrets.RMUX_RPM_REPO_GPG_KEY }}
        run: |
          : "${RMUX_APT_GPG_KEY:?missing RMUX_APT_GPG_KEY}"
          : "${RMUX_RPM_GPG_KEY:?missing RMUX_RPM_GPG_KEY}"
          : "${RMUX_RPM_REPO_GPG_KEY:?missing RMUX_RPM_REPO_GPG_KEY}"
          mkdir -p target/package-repositories
          scripts/generate-apt-repository.sh \
            --input-dir target/package-repository-inputs \
            --output-dir target/package-repositories/debian \
            --suite stable \
            --component main \
            --architecture amd64 \
            --architecture arm64 \
            --signing-key "$RMUX_APT_GPG_KEY"
          scripts/generate-rpm-repository.sh \
            --input-dir target/package-repository-inputs \
            --output-dir target/package-repositories/rpm \
            --baseurl https://packages.rmux.io/rpm \
            --gpg-key-url https://packages.rmux.io/rpm/RPM-GPG-KEY-rmux \
            --repo-gpg-key-url https://packages.rmux.io/rpm/RPM-GPG-KEY-rmux-repository \
            --rpm-signing-key "$RMUX_RPM_GPG_KEY" \
            --rpm-signing-version "$PACKAGE_VERSION" \
            --repo-signing-key "$RMUX_RPM_REPO_GPG_KEY"
          gpg --armor --export "$RMUX_APT_GPG_KEY" > target/package-repositories/debian/rmux.asc
          gpg --armor --export "$RMUX_RPM_GPG_KEY" > target/package-repositories/rpm/RPM-GPG-KEY-rmux
          gpg --armor --export "$RMUX_RPM_REPO_GPG_KEY" > target/package-repositories/rpm/RPM-GPG-KEY-rmux-repository
          test -f target/package-repositories/debian/rmux.asc
          test -f target/package-repositories/debian/dists/stable/Release
          test -f target/package-repositories/debian/dists/stable/InRelease
          test -f target/package-repositories/debian/dists/stable/Release.gpg
          test -f target/package-repositories/debian/dists/stable/main/binary-amd64/Packages.gz
          test -f target/package-repositories/debian/dists/stable/main/binary-arm64/Packages.gz
          test -f target/package-repositories/rpm/RPM-GPG-KEY-rmux
          test -f target/package-repositories/rpm/RPM-GPG-KEY-rmux-repository
          test -f target/package-repositories/rpm/repodata/repomd.xml
          test -f target/package-repositories/rpm/repodata/repomd.xml.asc
          test -f target/package-repositories/rpm/rmux.repo
          grep -qx 'gpgcheck=1' target/package-repositories/rpm/rmux.repo
          grep -qx 'repo_gpgcheck=1' target/package-repositories/rpm/rmux.repo
          cp target/PACKAGE_REPOSITORY_BASE target/package-repositories/PACKAGE_REPOSITORY_BASE
          (
            cd target/package-repositories
            find debian rpm PACKAGE_REPOSITORY_BASE -type f -print0 | LC_ALL=C sort -z | \
              xargs -0 sha256sum > SHA256SUMS
            sha256sum --check --strict SHA256SUMS
          )

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) && needs.source-gates.outputs.is_prerelease != 'true' }}
        with:
          name: linux-package-repositories-${{ env.RELEASE_REF }}
          path: target/package-repositories
          if-no-files-found: error

      - name: Create or update release
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
        shell: bash
        run: |
          tag="$RELEASE_REF"
          scripts/verify-release-tag-protection.sh "$GITHUB_REPOSITORY"
          scripts/verify-release-ref.sh "$GITHUB_REPOSITORY" "$tag" "$SOURCE_GIT_SHA"
          if release_is_draft="$(
            gh release view "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft \
              --jq .isDraft 2>/dev/null
          )"; then
            if [ "$release_is_draft" != "true" ]; then
              echo "Refusing to replace assets on published release $tag" >&2
              exit 1
            fi
          else
            release_args=(
              "$tag"
              --repo "$GITHUB_REPOSITORY"
              --verify-tag
              --target "$SOURCE_GIT_SHA"
              --title "$tag"
              --draft
              --notes "RMUX $PACKAGE_VERSION binary release identity $RELEASE_VERSION."
            )
            if [ "$IS_PRERELEASE" = "true" ]; then
              release_args+=(--prerelease)
            fi
            gh release create "${release_args[@]}"
          fi
          shopt -s nullglob
          assets=(
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.snap
            release-assets/SHA256SUMS
            release-assets/SHA256SUMS.sigstore.json
          )
          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found" >&2
            exit 1
          fi
          scripts/verify-release-tag-protection.sh "$GITHUB_REPOSITORY"
          scripts/verify-release-ref.sh "$GITHUB_REPOSITORY" "$tag" "$SOURCE_GIT_SHA"
          test "$(
            gh release view "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft \
              --jq .isDraft
          )" = "true" || {
            echo "Refusing to replace assets on published release $tag" >&2
            exit 1
          }
          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" "${assets[@]}" --clobber
          scripts/verify-release-tag-protection.sh "$GITHUB_REPOSITORY"
          scripts/verify-release-ref.sh "$GITHUB_REPOSITORY" "$tag" "$SOURCE_GIT_SHA"

  publish-snap:
    name: Publish Snap ${{ matrix.snap-arch }} candidate
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - publish
      - snap
    environment: release
    strategy:
      fail-fast: false
      matrix:
        snap-arch:
          - amd64
          - arm64
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: rmux-${{ env.RELEASE_REF }}-snap-${{ matrix.snap-arch }}
          path: snap-assets

      - name: Resolve snap package
        id: snap
        shell: bash
        run: |
          snap_path="$(find snap-assets -maxdepth 1 -type f -name '*.snap' | LC_ALL=C sort | head -n 1)"
          if [ -z "$snap_path" ]; then
            echo "No snap package found in artifact rmux-${RELEASE_REF}-snap-${{ matrix.snap-arch }}" >&2
            exit 1
          fi
          echo "snap=$snap_path" >> "$GITHUB_OUTPUT"

      - name: Validate Snap Store credentials
        shell: bash
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        run: |
          if [ -z "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            echo "Missing required secret: SNAPCRAFT_STORE_CREDENTIALS" >&2
            exit 1
          fi

      - name: Publish Snap to latest/candidate
        id: publish_snap
        uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snap.outputs.snap }}
          release: latest/candidate

      - name: Report Snap Store publication failure
        if: failure()
        shell: bash
        run: |
          cat <<'EOF'
          Snap Store publication failed. Authentication, transport, validation,
          and review-state failures are release failures until the Store reports
          a typed successful upload/release result.
          EOF

  validate-winget:
    name: Validate WinGet manifest
    runs-on: windows-latest
    timeout-minutes: 60
    needs:
      - prepare-release
      - source-gates
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      PACKAGE_VERSION: ${{ needs.source-gates.outputs.package_version }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
    steps:
      - name: Validate release ref
        shell: pwsh
        run: |
          if ($env:RELEASE_REF -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid release ref: $env:RELEASE_REF"
          }
          "VERSION=$env:PACKAGE_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: pwsh
        run: |
          $actual = (& git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $actual -ne $env:SOURCE_GIT_SHA) {
            throw "checked-out source does not match SOURCE_GIT_SHA"
          }

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: package-manager-metadata-${{ env.RELEASE_REF }}
          path: package-manager-metadata

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-validation-assets-${{ env.RELEASE_REF }}
          path: release-assets

      - name: Validate generated WinGet manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $manifest = "package-manager-metadata\winget\Helvesec.RMUX.yaml"
          .\scripts\validate-winget-manifest.ps1 `
            -Manifest $manifest `
            -Version $env:VERSION `
            -ReleaseTag $env:RELEASE_REF `
            -Checksums "release-assets\SHA256SUMS" `
            -Repository $env:GITHUB_REPOSITORY

      - name: Run winget validate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $manifest = "package-manager-metadata\winget"
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            throw "winget is required on the Windows release runner so the generated manifest is validated by the real WinGet CLI."
          }
          winget --version
          winget validate --manifest $manifest --disable-interactivity

  validate-chocolatey:
    name: Validate Chocolatey package
    runs-on: windows-latest
    timeout-minutes: 60
    needs:
      - prepare-release
      - source-gates
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      PACKAGE_VERSION: ${{ needs.source-gates.outputs.package_version }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
    steps:
      - name: Validate release ref
        shell: pwsh
        run: |
          if ($env:RELEASE_REF -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$') {
            throw "Invalid release ref: $env:RELEASE_REF"
          }
          "VERSION=$env:PACKAGE_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: pwsh
        run: |
          $actual = (& git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $actual -ne $env:SOURCE_GIT_SHA) {
            throw "checked-out source does not match SOURCE_GIT_SHA"
          }

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: package-manager-metadata-${{ env.RELEASE_REF }}
          path: package-manager-metadata

      - name: Validate Chocolatey prerequisites
        shell: pwsh
        run: |
          choco --version

      - name: Pack Chocolatey package
        id: chocolatey
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:VERSION
          $packageRoot = (Resolve-Path "package-manager-metadata\chocolatey\rmux").Path
          $nuspecPath = Join-Path $packageRoot "rmux.nuspec"
          $installScript = Join-Path $packageRoot "tools\chocolateyInstall.ps1"
          $uninstallScript = Join-Path $packageRoot "tools\chocolateyUninstall.ps1"

          foreach ($required in @($nuspecPath, $installScript, $uninstallScript)) {
            if (-not (Test-Path $required)) {
              throw "Missing generated Chocolatey file: $required"
            }
          }

          [xml]$nuspec = Get-Content $nuspecPath
          if ($nuspec.package.metadata.id -ne "rmux") {
            throw "Unexpected Chocolatey package id: $($nuspec.package.metadata.id)"
          }
          if ($nuspec.package.metadata.version -ne $version) {
            throw "Unexpected Chocolatey package version: $($nuspec.package.metadata.version)"
          }

          Push-Location $packageRoot
          try {
            choco pack .\rmux.nuspec --outputdirectory .
          } finally {
            Pop-Location
          }

          $package = Join-Path $packageRoot "rmux.$version.nupkg"
          if (-not (Test-Path $package)) {
            throw "Chocolatey package was not generated: $package"
          }
          "package=$package" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: chocolatey-package-${{ env.RELEASE_REF }}
          path: ${{ steps.chocolatey.outputs.package }}
          if-no-files-found: error

  publish:
    name: Publish canonical GitHub release
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
    needs:
      - source-gates
      - prepare-release
      - validate-external-configuration
      - validate-winget
      - validate-chocolatey
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_GIT_SHA"

      - name: Publish GitHub release
        shell: bash
        run: |
          # GitHub is the canonical public recovery point. APT/RPM, Snap, and
          # Chocolatey start only after this succeeds; those independent
          # stores cannot be made transactionally atomic with one another.
          scripts/verify-release-tag-protection.sh "$GITHUB_REPOSITORY"
          scripts/verify-release-ref.sh "$GITHUB_REPOSITORY" "$RELEASE_REF" "$SOURCE_GIT_SHA"
          release_is_draft="$(
            gh release view "$RELEASE_REF" \
              --repo "$GITHUB_REPOSITORY" \
              --json isDraft \
              --jq .isDraft
          )"
          case "$release_is_draft" in
            true)
              gh release edit "$RELEASE_REF" \
                --repo "$GITHUB_REPOSITORY" \
                --verify-tag \
                --target "$SOURCE_GIT_SHA" \
                --draft=false
              ;;
            false)
              # A failed post-publication verification may be retried without
              # republishing or blocking the downstream store jobs.
              echo "Canonical GitHub release $RELEASE_REF is already public."
              ;;
            *)
              echo "Unable to resolve draft state for $RELEASE_REF" >&2
              exit 1
              ;;
          esac
          scripts/verify-release-tag-protection.sh "$GITHUB_REPOSITORY"
          scripts/verify-release-ref.sh "$GITHUB_REPOSITORY" "$RELEASE_REF" "$SOURCE_GIT_SHA"

  publish-linux-repositories:
    name: Publish APT and RPM repositories
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) && needs.source-gates.outputs.is_prerelease != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    needs:
      - publish
      - prepare-release
      - source-gates
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
      GH_TOKEN: ${{ github.token }}
      RMUX_PACKAGE_REPO: Helvesec/rmux-packages
      RMUX_PACKAGE_REPO_BRANCH: main
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$SOURCE_GIT_SHA"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: linux-package-repositories-${{ env.RELEASE_REF }}
          path: package-repositories

      - name: Deploy Linux package repositories
        shell: bash
        env:
          RMUX_PACKAGE_REPO_TOKEN: ${{ secrets.RMUX_PACKAGE_REPO_TOKEN }}
        run: |
          scripts/verify-release-tag-protection.sh "$GITHUB_REPOSITORY"
          scripts/verify-release-ref.sh "$GITHUB_REPOSITORY" "$RELEASE_REF" "$SOURCE_GIT_SHA"
          : "${RMUX_PACKAGE_REPO_TOKEN:?missing RMUX_PACKAGE_REPO_TOKEN}"
          : "${RMUX_PACKAGE_REPO:?missing RMUX_PACKAGE_REPO}"
          : "${RMUX_PACKAGE_REPO_BRANCH:?missing RMUX_PACKAGE_REPO_BRANCH}"

          test -d package-repositories/debian
          test -d package-repositories/rpm
          test -s package-repositories/PACKAGE_REPOSITORY_BASE
          test -s package-repositories/SHA256SUMS
          (
            cd package-repositories
            sha256sum --check --strict SHA256SUMS
          )

          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          package_repo_url="https://x-access-token:${RMUX_PACKAGE_REPO_TOKEN}@github.com/${RMUX_PACKAGE_REPO}.git"
          git clone --depth 1 --branch "$RMUX_PACKAGE_REPO_BRANCH" "$package_repo_url" "$work"
          expected_base="$(tr -d '\r\n' < package-repositories/PACKAGE_REPOSITORY_BASE)"
          scripts/verify-package-repository-base.sh "$work" "$expected_base"

          rm -rf "$work/debian" "$work/rpm"
          cp -a package-repositories/debian "$work/debian"
          cp -a package-repositories/rpm "$work/rpm"

          cat > "$work/index.html" <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>RMUX Packages</title>
            </head>
            <body>
              <h1>RMUX Packages</h1>
              <ul>
                <li><a href="/debian/dists/stable/InRelease">APT repository</a></li>
                <li><a href="/rpm/rmux.repo">RPM repository</a></li>
              </ul>
            </body>
          </html>
          EOF

          cat > "$work/_headers" <<'EOF'
          /debian/dists/*
            Cache-Control: public, max-age=300

          /debian/rmux.asc
            Cache-Control: public, max-age=3600

          /debian/pool/*
            Cache-Control: public, max-age=31536000, immutable

          /rpm/repodata/*
            Cache-Control: public, max-age=300

          /rpm/RPM-GPG-KEY-rmux
            Cache-Control: public, max-age=3600

          /rpm/rmux.repo
            Cache-Control: public, max-age=300

          /rpm/*.rpm
            Cache-Control: public, max-age=31536000, immutable
          EOF

          cd "$work"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "Linux package repository already points to $RELEASE_REF."
            exit 0
          fi

          git add _headers index.html debian rpm
          git commit -m "packages: publish rmux $RELEASE_REF"
          git push "$package_repo_url" "HEAD:$RMUX_PACKAGE_REPO_BRANCH"

  publish-chocolatey:
    name: Publish Chocolatey package
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_external_package_publish) && needs.source-gates.outputs.is_prerelease != 'true' }}
    runs-on: windows-latest
    timeout-minutes: 60
    needs:
      - publish
      - source-gates
      - validate-chocolatey
    environment: release
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      PACKAGE_VERSION: ${{ needs.source-gates.outputs.package_version }}
      SOURCE_GIT_SHA: ${{ needs.source-gates.outputs.source_git_sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SOURCE_GIT_SHA }}
          persist-credentials: false

      - name: Verify immutable source checkout
        shell: pwsh
        run: |
          $actual = (& git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $actual -ne $env:SOURCE_GIT_SHA) {
            throw "checked-out source does not match SOURCE_GIT_SHA"
          }

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: chocolatey-package-${{ env.RELEASE_REF }}
          path: chocolatey-package

      - name: Smoke-test Chocolatey package against public assets
        shell: pwsh
        run: |
          # The generated install script intentionally downloads the canonical
          # GitHub URL, so this rollout smoke cannot run against a private draft.
          $ErrorActionPreference = "Stop"
          $version = $env:PACKAGE_VERSION
          $package = "chocolatey-package\rmux.$version.nupkg"
          if (-not (Test-Path $package)) {
            throw "Chocolatey package not found: $package"
          }
          $packageRoot = (Resolve-Path "chocolatey-package").Path

          choco install rmux `
            --source $packageRoot `
            --version $version `
            --yes `
            --no-progress `
            --force

          $versionOutput = (& rmux -V).Trim()
          if ($versionOutput -ne "rmux $version") {
            throw "Unexpected rmux version from Chocolatey install: $versionOutput"
          }

          .\scripts\smoke-installed-rmux.ps1 -Rmux rmux -RequireDaemonCommand
          choco uninstall rmux --yes --no-progress
          "CHOCOLATEY_PACKAGE=$package" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Push Chocolatey package
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:CHOCOLATEY_API_KEY)) {
            throw "Missing required GitHub Actions secret: CHOCOLATEY_API_KEY"
          }

          $version = $env:PACKAGE_VERSION
          $query = "https://community.chocolatey.org/api/v2/FindPackagesById()?id='rmux'"
          $response = Invoke-WebRequest -Uri $query -Method Get
          [xml]$feed = $response.Content
          $namespaceManager = [System.Xml.XmlNamespaceManager]::new($feed.NameTable)
          $namespaceManager.AddNamespace("atom", "http://www.w3.org/2005/Atom")
          $namespaceManager.AddNamespace("m", "http://schemas.microsoft.com/ado/2007/08/dataservices/metadata")
          $namespaceManager.AddNamespace("d", "http://schemas.microsoft.com/ado/2007/08/dataservices")
          $existingVersion = $feed.SelectSingleNode("//atom:entry/m:properties[d:Version='$version']/d:Version", $namespaceManager)
          if ($existingVersion) {
            Write-Host "Chocolatey package rmux $version already exists; skipping push."
            exit 0
          }

          choco push $env:CHOCOLATEY_PACKAGE `
            --source "https://push.chocolatey.org/" `
            --api-key $env:CHOCOLATEY_API_KEY `
            --yes `
            --no-progress
